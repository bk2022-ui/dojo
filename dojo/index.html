<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#faf6ee">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Dōjō">
<title>Dōjō</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#faf6ee;--card:#ffffff;--ink:#26241f;--muted:#7c766a;--line:rgba(38,36,31,.22);--shadow:0 1px 3px rgba(38,36,31,.10),0 1px 2px rgba(38,36,31,.06);
    --accent:#c2562f;--accent-soft:#f6e4dc;
    --unseen:#bdb8ac;--new:#c0573a;--heard:#c8952a;--known:#4a8a5c;
    --bk-bg:#e7efe4;--bk-fg:#3c6c49;--hd-bg:#f4ead3;--hd-fg:#846017;--nk-bg:#f4e3db;--nk-fg:#9a472b;
    --safe-top:env(safe-area-inset-top);--safe-bot:env(safe-area-inset-bottom);
  }
  @media (prefers-color-scheme:dark){
    :root{--paper:#15140f;--card:#262218;--ink:#f0ebe0;--muted:#a39c8c;--line:rgba(240,235,224,.24);--shadow:0 1px 3px rgba(0,0,0,.5);
      --accent:#e0925c;--accent-soft:#3a221c;--unseen:#5f5a4e;
      --bk-bg:#26352b;--bk-fg:#86bd95;--hd-bg:#352f1f;--hd-fg:#d6b066;--nk-bg:#382520;--nk-fg:#e0967a;}
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{background:var(--paper);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;line-height:1.5}
  #app{max-width:560px;margin:0 auto;min-height:100svh;display:flex;flex-direction:column;padding:calc(var(--safe-top) + 10px) 16px 0}
  .hdr{display:flex;align-items:center;gap:10px;margin:2px 0 14px;min-height:34px}
  .hdr h1{font-family:"Caveat",cursive;font-size:34px;margin:0;flex:1}
  .hdr .sub{font-size:13px;color:var(--muted)}
  .back{background:none;border:none;color:var(--ink);font-size:26px;line-height:1;padding:0 8px 0 0;cursor:pointer}
  .iconbtn{background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;padding:6px;text-decoration:underline}
  .pad{padding-bottom:calc(var(--safe-bot) + 16px)}
  .stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;box-shadow:var(--shadow)}
  .stat b{font-size:24px;display:block;line-height:1.1}
  .stat span{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .cta{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;border:none;
    background:var(--accent);color:#fff;border-radius:14px;padding:15px;font-size:16px;font-weight:600;
    cursor:pointer;margin-bottom:18px;font-family:inherit}
  .cta.soft{background:var(--card);color:var(--ink);border:1px solid var(--line)}
  .cta.dk{background:var(--nk-bg);color:var(--nk-fg)}
  .cta:disabled{opacity:.45}
  .sectitle{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin:4px 2px 8px}
  .catlist,.cardlist{display:flex;flex-direction:column;gap:9px}
  .row{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);
    border-radius:14px;padding:13px 14px;cursor:pointer;text-align:left;width:100%;color:inherit;font-family:inherit;box-shadow:var(--shadow)}
  .row:active{transform:scale(.99)}
  .catrow{flex-wrap:wrap}
  .catrow .cname{font-size:17px;font-weight:600;flex:1}
  .catrow .cnum{font-size:13px;color:var(--muted)}
  .duebadge{font-size:12px;font-weight:600;color:var(--accent);background:var(--accent-soft);
    border-radius:999px;padding:2px 9px;margin-left:8px}
  .bar{flex-basis:100%;height:5px;background:var(--line);border-radius:5px;overflow:hidden;margin-top:4px}
  .bar i{display:block;height:100%;background:var(--known)}
  .chev{color:var(--muted);font-size:20px}
  .dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;background:var(--unseen)}
  .dot.new{background:var(--new)}.dot.heard{background:var(--heard)}.dot.known{background:var(--known)}
  .cr-main{flex:1;min-width:0}
  .cr-name{font-size:16px;font-weight:600}
  .cr-name em{font-style:normal;color:var(--muted);font-weight:400;margin-left:6px}
  .cr-next{font-size:12px;color:var(--muted)}
  .cr-due{color:var(--accent);font-weight:600}
  .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin:14px 2px;justify-content:center}
  .legend span{display:flex;align-items:center;gap:5px}
  /* STUDY */
  .study{flex:1;display:flex;flex-direction:column}
  .scard{background:var(--card);border:1px solid var(--line);border-radius:20px;
    padding:24px 20px 22px;cursor:pointer;min-height:190px;margin-bottom:6px;box-shadow:var(--shadow)}
  .scard .center{text-align:center}
  .kanji{font-size:52px;color:var(--accent);line-height:1;margin-bottom:8px}
  .card-sub{font-size:13px;color:var(--muted);margin-bottom:8px;font-style:italic}
  .sname{font-family:"Caveat",cursive;font-size:40px;line-height:1;margin-bottom:4px}
  .say{display:inline-flex;align-items:center;gap:5px;background:var(--card);border:1px solid var(--line);
    color:var(--muted);border-radius:999px;padding:5px 12px;font-size:13px;cursor:pointer;font-family:inherit;margin-bottom:8px;box-shadow:var(--shadow)}
  .say svg{width:15px;height:15px}
  .say:active{transform:scale(.96)}
  .sdom{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
  .sstatus{font-size:12px;color:var(--muted);margin-top:10px}
  .back-rev{text-align:left}
  .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--accent);font-weight:600;margin:16px 0 3px}
  .back-rev p{margin:0;font-size:16px}
  .srcquote{margin:0;font-size:16px;font-style:italic;line-height:1.5;border-left:3px solid var(--accent);padding:1px 0 1px 13px}
  .srccredit{font-size:12px;color:var(--muted);margin-top:7px}
  .srccredit a{color:var(--muted);text-decoration:underline}
  .hint{color:var(--muted);font-size:14px;text-align:center;margin-top:18px}
  .ratebar{position:sticky;bottom:0;z-index:5;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;
    background:var(--paper);border-top:1px solid var(--line);
    padding:10px 0 calc(var(--safe-bot) + 8px);margin-top:auto}
  .ratebar button{border:1px solid transparent;border-radius:13px;padding:11px 4px;font-weight:600;
    font-size:14px;cursor:pointer;font-family:inherit;line-height:1.15;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
  .ratebar small{font-weight:400;opacity:.75;font-size:10px}
  .ratebar button:active{transform:scale(.97)}
  .r-known{background:var(--bk-bg);color:var(--bk-fg)}
  .r-heard{background:var(--hd-bg);color:var(--hd-fg)}
  .r-new{background:var(--nk-bg);color:var(--nk-fg)}
  .empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;text-align:center;color:var(--muted);padding-bottom:40px}
  .empty .big{font-size:42px}
  .spacer{flex:1}
  /* WELCOME */
  .welcome{flex:1;display:flex;align-items:center;justify-content:center;padding:20px 0 40px}
  .welcome-inner{text-align:center;max-width:320px;width:100%}
  .w-logo{font-family:"Caveat",cursive;font-size:80px;color:var(--accent);line-height:1;margin-bottom:4px}
  .w-title{font-family:"Caveat",cursive;font-size:42px;margin:0 0 8px;color:var(--ink)}
  .w-sub{color:var(--muted);font-size:16px;margin:0 0 36px;line-height:1.5}
  .w-form{display:flex;flex-direction:column;gap:12px}
  .w-label{font-size:14px;color:var(--muted);text-align:left}
  .w-input{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px;
    font-size:18px;color:var(--ink);font-family:inherit;outline:none;width:100%}
  .w-input:focus{border-color:var(--accent)}
  /* TOPICS */
  .greeting{margin-bottom:18px}
  .g-name{display:block;font-size:22px;font-weight:700;margin-bottom:4px}
  .g-session{display:block;font-size:14px;color:var(--muted);margin-bottom:6px}
  .streak{display:inline-block;font-size:13px;font-weight:600;color:var(--known);background:var(--bk-bg);
    border-radius:999px;padding:3px 10px}
  .deck-list{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
  .deck-card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;
    cursor:pointer;text-align:left;width:100%;color:inherit;font-family:inherit;box-shadow:var(--shadow)}
  .deck-card:active{transform:scale(.99)}
  .dc-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
  .dc-emoji{font-size:28px;line-height:1;margin-top:2px}
  .dc-titles{flex:1}
  .dc-name{display:block;font-size:18px;font-weight:700;margin-bottom:2px}
  .dc-tag{display:block;font-size:13px;color:var(--muted);line-height:1.4}
  .dc-footer{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .dc-stat{font-size:13px;color:var(--muted)}
  .dc-bar{flex:1;height:5px;background:var(--line);border-radius:5px;overflow:hidden;min-width:40px}
  .dc-bar i{display:block;height:100%;background:var(--known)}
  .deck-accent{width:4px;border-radius:4px;align-self:stretch;flex-shrink:0}
</style>
</head>
<body>
<!-- Bharat Khandelwal portfolio ribbon — shown only when the visitor arrived from bharatkhandelwal.com -->
<a id="bk-ribbon" href="https://bharatkhandelwal.com" hidden style="position:fixed;top:0;left:0;z-index:99999;font-family:Georgia,'Times New Roman',serif;font-size:13px;color:#555;background:rgba(255,255,255,.92);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);padding:6px 13px;border:1px solid rgba(0,0,0,.09);border-top:none;border-left:none;border-bottom-right-radius:9px;text-decoration:none;line-height:1.4;box-shadow:0 2px 8px rgba(0,0,0,.05)">←&nbsp;Bharat&nbsp;Khandelwal</a>
<script>(function(){function f(){if(/[?&]from=bk(?:&|$)/.test(location.search))return true;try{var h=new URL(document.referrer).hostname;if(h==='bharatkhandelwal.com'||h.endsWith('.bharatkhandelwal.com'))return true;}catch(e){}try{return sessionStorage.getItem('bk_from')==='1';}catch(e){return false;}}if(f()){try{sessionStorage.setItem('bk_from','1');}catch(e){}var el=document.getElementById('bk-ribbon');if(el)el.hidden=false;}})();</script>
<div id="app"></div>
<script>
/* ========== CONTENT (decks + cards) ==========
   Content is data, not code. It lives in decks.json — bundled inside the app as a
   seed (works offline, instantly) and fetched fresh from napkinsolo.ai so new decks
   appear without an app update. The engine below never changes when content does. */
let CARDS = [];   // flat list, each card tagged with .deck — set by applyContent()
let DECKS = [];   // deck metadata (no cards)              — set by applyContent()

const ENGINE_VERSION = 1;
const CONTENT_KEY    = "dojo.content.v1";                                // localStorage cache
const CONTENT_SEED   = "./content/decks.json";                          // bundled, offline
const CONTENT_REMOTE = "https://napkinsolo.ai/dojo/content/decks.json"; // live updates
let contentVersion = -1;

function applyContent(data){
  if(!data || !Array.isArray(data.decks)) return false;
  const decks = data.decks.filter(d => (d.minEngineVersion||1) <= ENGINE_VERSION);
  if(!decks.length) return false;
  DECKS = decks.map(d => ({
    id:d.id, name:d.name, tagline:d.tagline, emoji:d.emoji, lang:d.lang, color:d.color,
    domains: (d.domains && d.domains.length) ? d.domains : [...new Set((d.cards||[]).map(c=>c.domain))]
  }));
  CARDS = [];
  decks.forEach(d => (d.cards||[]).forEach(c => CARDS.push(Object.assign({}, c, {deck:d.id}))));
  contentVersion = data.contentVersion || 0;
  return true;
}

async function getJSON(url){
  const r = await fetch(url, {cache:"no-store"});
  if(!r.ok) throw new Error("http "+r.status);
  return await r.json();
}

/* Render instantly from cached content; fall back to the bundled seed. */
async function loadContentInitial(){
  try{ const c = JSON.parse(localStorage.getItem(CONTENT_KEY)); if(c && applyContent(c)) return true; }catch(e){}
  try{ const seed = await getJSON(CONTENT_SEED);
       if(applyContent(seed)){ try{ localStorage.setItem(CONTENT_KEY, JSON.stringify(seed)); }catch(e){} return true; } }catch(e){}
  return false;
}

/* Background: pull the live file; if newer, swap it in and refresh the current view. */
async function refreshContent(){
  try{
    const remote = await getJSON(CONTENT_REMOTE);
    if(remote && (remote.contentVersion||0) > contentVersion && applyContent(remote)){
      try{ localStorage.setItem(CONTENT_KEY, JSON.stringify(remote)); }catch(e){}
      if(nav.view==="topics") topics();
      else if(nav.view==="home" && activeDeck){ activeDeck = DECKS.find(d=>d.id===activeDeck.id) || activeDeck; deckHome(); }
    }
  }catch(e){ /* offline / error: keep what we have */ }
}

/* ========== iCLOUD SYNC ==========
   localStorage is the working store; iCloud KVS is the durable, cross-device
   backbone. On a real signed iOS build with the iCloud capability enabled, the
   native ICloudKV plugin is present and we mirror to it. Everywhere else
   (web preview, Android), Cloud.available is false and every call no-ops —
   the app runs purely on localStorage, exactly as before. */
const Cloud = (() => {
  const P = window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.ICloudKV;
  const available = !!P;
  return {
    available,
    async get(key){ if(!available) return null; try{ const r=await P.get({key}); return (r&&r.value)?r.value:null; }catch(e){ return null; } },
    async set(key,value){ if(!available) return; try{ await P.set({key,value}); }catch(e){} },
    async remove(key){ if(!available) return; try{ await P.remove({key}); }catch(e){} },
    onChange(cb){ if(!available) return; try{ P.addListener("change",cb); }catch(e){} }
  };
})();
/* Merge rules: progress is per-card last-write-wins by each card's .last
   timestamp; the user record follows the most recent lastSeen. */
function mergeProgress(a,b){
  const out=Object.assign({},a||{});
  for(const id in (b||{})){
    const bp=b[id], ap=out[id];
    if(!ap || (bp.last||0)>(ap.last||0)) out[id]=bp;
  }
  return out;
}
function mergeUser(a,b){
  if(!a) return b; if(!b) return a;
  return (b.lastSeen||0)>(a.lastSeen||0) ? b : a;
}

/* ========== USER STATE ========== */
const UKEY = "dojo.user.v1";
let user = null;
function loadUser(){ try{ const u=JSON.parse(localStorage.getItem(UKEY)); return(u&&u.name)?u:null; }catch(e){return null;} }
function saveUser(skipCloud){ localStorage.setItem(UKEY,JSON.stringify(user)); if(!skipCloud) Cloud.set(UKEY,JSON.stringify(user)); }

/* ========== PROGRESS ========== */
const KEY = "dojo.progress.v1";
const DAY = 864e5, MIN = 6e4, INT = [0,1,3,7,16,30];
let prog = {};
function load(){ try{ return JSON.parse(localStorage.getItem(KEY))||{}; }catch(e){ return{}; } }
function save(skipCloud){ localStorage.setItem(KEY,JSON.stringify(prog)); if(!skipCloud) Cloud.set(KEY,JSON.stringify(prog)); }

/* ========== SESSION TRACKING ========== */
function dateStr(ts){
  const d = ts ? new Date(ts) : new Date();
  return d.toISOString().slice(0,10);
}
function touchSession(){
  if(!user) return;
  const today = dateStr();
  if(user.lastDay === today) return;
  const yest = dateStr(Date.now() - DAY);
  if(user.lastDay === yest) user.streak = (user.streak||0) + 1;
  else user.streak = 1;
  user.lastDay = today;
  user.lastSeen = Date.now();
  user.sessions = (user.sessions||0) + 1;
  saveUser();
}
function lastSeenMsg(){
  if(!user||!user.lastSeen||!user.sessions||user.sessions<=1) return "";
  const days = Math.floor((Date.now() - user.lastSeen) / DAY);
  if(days === 0) return "You were here today.";
  if(days === 1) return "You were last here yesterday.";
  return `You were last here ${days} days ago.`;
}

/* ========== PROGRESS HELPERS ========== */
const deckCards   = d  => CARDS.filter(c => c.deck === d.id);
const domainCards = (d,dom) => CARDS.filter(c => c.deck === d.id && c.domain === dom);
function seen(id){ const p=prog[id]; return p&&p.seen; }
function statusOf(id){ const p=prog[id]; if(!p||!p.seen) return "unseen"; return p.r||"unseen"; }
function isDue(id){ const p=prog[id]; if(!p||!p.seen) return false; return (p.due||0)<=Date.now(); }
function isNew(id){ return !seen(id); }
function knownCount(list){ return list.filter(c=>statusOf(c.id)==="known").length; }
function dueList(list){ return list.filter(c=>isDue(c.id)); }
function newList(list){ return list.filter(c=>isNew(c.id)); }
function dontKnowList(list){
  return list.filter(c=>statusOf(c.id)==="new").sort((a,b)=>(prog[a.id]&&prog[a.id].due||0)-(prog[b.id]&&prog[b.id].due||0));
}

/* ========== RATING ========== */
function rate(id,r){
  const p = prog[id]||{box:0,seen:0};
  if(r==="known"){ p.box=Math.min((p.box||0)+1,5); p.due=Date.now()+INT[p.box]*DAY; }
  else if(r==="heard"){ p.box=Math.max(p.box||0,1); p.due=Date.now()+1*DAY; }
  else { p.box=0; p.due=Date.now()+10*MIN; }
  p.r=r; p.seen=(p.seen||0)+1; p.last=Date.now();
  prog[id]=p; save();
}

/* ========== NAVIGATION ========== */
let nav = {view:"topics"};
let activeDeck = null;
let sess = null;
const $ = s => document.getElementById(s);

/* ========== WELCOME ========== */
function welcome(){
  nav={view:"welcome"};
  render(`<div class="welcome">
    <div class="welcome-inner">
      <div class="w-logo">道場</div>
      <h1 class="w-title">Dōjō</h1>
      <p class="w-sub">A calm place to truly learn ideas worth knowing.</p>
      <div class="w-form">
        <label class="w-label">What's your name?</label>
        <input id="nameInput" class="w-input" type="text" placeholder="First name" autocomplete="given-name" autocorrect="off" autocapitalize="words">
        <button class="cta" id="startBtn" style="margin-bottom:0">Let's begin →</button>
      </div>
    </div>
  </div>`);
  const inp=$("nameInput"), btn=$("startBtn");
  setTimeout(()=>inp.focus(),100);
  btn.onclick=()=>{
    const name=inp.value.trim();
    if(!name) return;
    user={name, firstSeen:Date.now(), lastSeen:Date.now(), lastDay:dateStr(), streak:1, sessions:1};
    saveUser();
    topics();
  };
  inp.onkeydown=e=>{ if(e.key==="Enter") btn.click(); };
}

/* ========== TOPICS ========== */
function topics(){
  touchSession();
  nav={view:"topics"};
  const hour = new Date().getHours();
  const g = hour<12 ? "Good morning" : hour<18 ? "Good afternoon" : "Good evening";
  const name = user ? user.name : "";
  const msg = lastSeenMsg();
  const streak = user&&user.streak>1 ? `<span class="streak">🔥 ${user.streak}-day streak</span>` : "";

  let h=`<div class="hdr"><h1>Dōjō</h1></div>
  <div class="pad">
  <div class="greeting">
    <span class="g-name">${g}${name?", "+name:""}.</span>
    ${msg?`<span class="g-session">${msg}</span>`:""}
    ${streak}
  </div>
  <div class="sectitle">Choose a topic</div>
  <div class="deck-list">`;

  DECKS.forEach(d=>{
    const cards=deckCards(d), known=knownCount(cards), due=dueList(cards).length, total=cards.length;
    const pct=total?Math.round(known/total*100):0;
    h+=`<button class="deck-card" data-deck="${d.id}">
      <div class="dc-header">
        <div class="deck-accent" style="background:${d.color}"></div>
        <span class="dc-emoji">${d.emoji}</span>
        <div class="dc-titles">
          <span class="dc-name">${d.name}</span>
          <span class="dc-tag">${d.tagline}</span>
        </div>
        <span class="chev">›</span>
      </div>
      <div class="dc-footer">
        <span class="dc-stat">${known}/${total} known</span>
        ${due>0?`<span class="duebadge">${due} due</span>`:""}
        <span class="dc-bar"><i style="width:${pct}%"></i></span>
      </div>
    </button>`;
  });

  h+=`</div></div>`;
  render(h);
  $("app").querySelectorAll("[data-deck]").forEach(b=>b.onclick=()=>{
    activeDeck = DECKS.find(d=>d.id===b.dataset.deck);
    deckHome();
  });
}

/* ========== DECK HOME ========== */
function deckHome(){
  nav={view:"home"};
  const d=activeDeck;
  const cc=deckCards(d), known=knownCount(cc), due=dueList(cc).length, dk=dontKnowList(cc).length;
  let h=`<div class="hdr"><button class="back" data-act="topics">‹</button><h1 style="font-size:26px">${d.emoji} ${d.name}</h1></div>
  <div class="pad">
  <div class="stats">
    <div class="stat"><b>${known}</b><span>known</span></div>
    <div class="stat"><b>${dk}</b><span>don't know</span></div>
    <div class="stat"><b>${due}</b><span>due now</span></div>
  </div>`;
  if(due>0) h+=`<button class="cta" data-act="reviewall">Review due · ${due} →</button>`;
  else h+=`<button class="cta" data-act="learnall">Start learning →</button>`;
  if(dk>0) h+=`<button class="cta dk" data-act="learnunknown">Teach me what I don't know · ${dk} →</button>`;
  h+=`<div class="sectitle">Categories</div><div class="catlist">`;
  d.domains.forEach(dom=>{
    const list=domainCards(d,dom), k=knownCount(list), du=dueList(list).length;
    const pct=list.length?Math.round(k/list.length*100):0;
    h+=`<button class="row catrow" data-dom="${dom}">
      <span class="cname">${dom}</span>
      <span class="cnum">${k}/${list.length} known</span>
      ${du>0?`<span class="duebadge">${du} due</span>`:""}
      <span class="chev">›</span>
      <span class="bar"><i style="width:${pct}%"></i></span>
    </button>`;
  });
  h+=`</div>
  <div class="legend">
    <span><i class="dot"></i>new</span><span><i class="dot new"></i>don't know</span>
    <span><i class="dot heard"></i>heard of</span><span><i class="dot known"></i>known</span>
  </div>
  <button class="iconbtn" data-act="reset" style="display:block;margin:6px auto 0">reset progress</button>
  </div>`;
  render(h);
  $("app").querySelectorAll("[data-dom]").forEach(b=>b.onclick=()=>category(b.dataset.dom));
  bindActs();
}

/* ========== CATEGORY ========== */
function category(dom){
  nav={view:"category",dom};
  const d=activeDeck;
  const list=domainCards(d,dom), k=knownCount(list), du=dueList(list).length, nw=newList(list).length;
  let h=`<div class="hdr"><button class="back" data-act="home">‹</button><h1 style="font-size:26px">${dom}</h1></div>
  <div class="pad">
  <div class="stats">
    <div class="stat"><b>${k}/${list.length}</b><span>known</span></div>
    <div class="stat"><b>${du}</b><span>due now</span></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px">
    <button class="cta soft" data-act="learncat" ${nw?"":"disabled"}>Learn new · ${nw}</button>
    <button class="cta soft" data-act="reviewcat" ${du?"":"disabled"}>Review due · ${du}</button>
  </div>
  <div class="sectitle">All cards — tap any to study</div>
  <div class="cardlist">`;
  list.forEach(c=>{
    h+=`<button class="row" data-id="${c.id}">
      <span class="dot ${statusOf(c.id)==="unseen"?"":statusOf(c.id)}"></span>
      <span class="cr-main"><span class="cr-name">${c.name}<em>${c.kanji||""}</em></span></span>
      <span class="cr-next ${isDue(c.id)?"cr-due":""}">${nextLabel(c.id)}</span>
    </button>`;
  });
  h+=`</div></div>`;
  render(h);
  $("app").querySelectorAll("[data-id]").forEach(b=>b.onclick=()=>startSession([b.dataset.id],{ret:"category",dom}));
  bindActs();
}

/* ========== STUDY ========== */
function startSession(ids,opts){
  if(!ids.length) return;
  sess={ids,i:0,ret:opts.ret,dom:opts.dom,flipped:false};
  nav={view:"study"};
  study();
}
function study(){
  const c = CARDS.find(x=>x.id===sess.ids[sess.i]);
  const lang = activeDeck ? activeDeck.lang : "ja-JP";
  const isJapan = activeDeck && activeDeck.id==="japan";
  const total = sess.ids.length;
  const kanjiHtml = c.kanji
    ? (isJapan
        ? `<div class="kanji">${c.kanji}</div>`
        : `<div class="card-sub">${c.kanji}</div>`)
    : "";
  const showSay = (lang !== "en-US") || isJapan;
  let h=`<div class="hdr"><button class="back" data-act="exit">‹</button><span class="sub" style="flex:1;text-align:center">${sess.i+1} / ${total}</span><span style="width:24px"></span></div>
  <div class="study">
    <div class="scard" id="scard">
      <div class="center">
        ${kanjiHtml}
        <div class="sname">${c.name}</div>
        ${showSay?`<button class="say" id="saybtn" aria-label="Pronounce ${c.name}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M19 5a9 9 0 0 1 0 14"/></svg><span>say it</span></button>`:""}
        <div class="sdom">${c.domain}</div>
        <div class="sstatus">${seen(c.id)?("last: "+labelOf(statusOf(c.id))+" · review "+duePhrase(c.id)):"new card"}</div>
      </div>
      <div id="rev" class="back-rev" style="display:none">
        <div class="lbl">What it means</div><p>${esc(c.description)}</p>
        ${c.source&&c.source.quote?`<div class="lbl">In their words</div><blockquote class="srcquote">${esc(c.source.quote)}</blockquote><div class="srccredit">${c.source.url?`<a href="${esc(c.source.url)}" target="_blank" rel="noopener">`:""}${esc(c.source.credit||"")}${c.source.ref?" · "+esc(c.source.ref):""}${c.source.url?`</a>`:""}</div>`:""}
        <div class="lbl">In practice</div><p>${esc(c.example)}</p>
        <div class="lbl">Test yourself</div><p>${esc(c.q)}</p>
      </div>
      <div class="hint" id="hint">tap to reveal · or just rate it</div>
    </div>
    <div class="ratebar">
      <button class="r-known" data-r="known">Known<small>solid</small></button>
      <button class="r-heard" data-r="heard">Heard of<small>vaguely</small></button>
      <button class="r-new" data-r="new">Don't know<small>teach me</small></button>
    </div>
  </div>`;
  render(h);
  $("scard").onclick = flip;
  const sb=$("saybtn"); if(sb) sb.onclick=e=>{e.stopPropagation();say(c.kanji||c.name,lang);};
  $("app").querySelectorAll(".ratebar button").forEach(b=>b.onclick=()=>doRate(c,b.dataset.r));
  bindActs();
}
function flip(){
  if(sess.flipped) return;
  sess.flipped=true;
  $("rev").style.display="block"; $("hint").style.display="none";
}
function advance(){
  if(sess.i < sess.ids.length-1){ sess.i++; sess.flipped=false; study(); return; }
  const multi=sess.ids.length>1, ret=sess.ret, dom=sess.dom, n=sess.ids.length; sess=null;
  if(multi) doneScreen(n,ret,dom);
  else if(ret==="category"&&dom) category(dom);
  else deckHome();
}
function teach(c){
  if(!sess.flipped){ sess.flipped=true; const r=$("rev"); if(r) r.style.display="block"; const h=$("hint"); if(h) h.style.display="none"; }
  const rb=$("app").querySelector(".ratebar");
  if(rb) rb.innerHTML=`<button class="cta" id="gotit" style="margin:0;border-radius:13px;grid-column:1/-1">Got it — keep going →</button>`;
  const g=$("gotit"); if(g) g.onclick=advance;
}
function doRate(c,r){ rate(c.id,r); if(r==="new"){teach(c);return;} advance(); }
function doneScreen(n,ret,dom){
  nav={view:"done",dom,ret};
  render(`<div class="hdr"><h1 style="font-size:28px">Nice work</h1></div>
    <div class="empty"><div class="big">🍵</div><p>You went through ${n} card${n>1?"s":""}.</p>
    <button class="cta" data-act="${ret==="category"?"backcat":"home"}" style="max-width:240px">Back</button></div>`);
  bindActs();
}
function exitSession(){ const ret=sess?sess.ret:"home",dom=sess?sess.dom:null; sess=null; if(ret==="category"&&dom) category(dom); else deckHome(); }
function labelOf(r){ return r==="known"?"Known":r==="heard"?"Heard of":r==="new"?"Don't know":"new"; }

/* ========== HELPERS ========== */
function esc(s){ return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function say(text,lang){
  try{
    if(!("speechSynthesis" in window)||!text) return;
    const u=new SpeechSynthesisUtterance(text);
    u.lang=lang||"ja-JP"; u.rate=.85;
    const vs=speechSynthesis.getVoices();
    const lv=vs.find(v=>v.lang===lang)||vs.find(v=>v.lang.startsWith((lang||"ja").slice(0,2)));
    if(lv) u.voice=lv;
    speechSynthesis.cancel(); speechSynthesis.speak(u);
  }catch(e){}
}
function nextLabel(id){
  const p=prog[id]; if(!p||!p.seen) return "new";
  const d=p.due-Date.now();
  if(d<=0) return "due now";
  const days=Math.round(d/DAY);
  if(days<1) return "today";
  if(days<30) return days+"d";
  return Math.round(days/30)+"mo";
}
function duePhrase(id){
  const p=prog[id]; if(!p) return "";
  const d=p.due-Date.now(), days=Math.round(d/DAY);
  if(d<=0) return "now"; if(days<1) return "later today"; if(days===1) return "tomorrow";
  if(days<30) return "in "+days+" days"; return "in "+Math.round(days/30)+" months";
}
function render(h){ $("app").innerHTML=h; }
function bindActs(){
  $("app").querySelectorAll("[data-act]").forEach(b=>{
    const a=b.dataset.act;
    b.onclick=()=>{
      if(a==="topics") topics();
      else if(a==="home") deckHome();
      else if(a==="backcat") category(nav.dom);
      else if(a==="reviewall") startSession(dueList(deckCards(activeDeck)).map(c=>c.id),{ret:"home"});
      else if(a==="learnall") startSession(newList(deckCards(activeDeck)).slice(0,20).map(c=>c.id),{ret:"home"});
      else if(a==="learnunknown") startSession(dontKnowList(deckCards(activeDeck)).map(c=>c.id),{ret:"home"});
      else if(a==="learncat") startSession(newList(domainCards(activeDeck,nav.dom)).map(c=>c.id),{ret:"category",dom:nav.dom});
      else if(a==="reviewcat") startSession(dueList(domainCards(activeDeck,nav.dom)).map(c=>c.id),{ret:"category",dom:nav.dom});
      else if(a==="exit") exitSession();
      else if(a==="reset"){ if(confirm("Reset all your progress?")){ prog={};save();Cloud.remove(KEY);deckHome(); } }
    };
  });
}

/* ========== INIT ========== */
async function reconcile(){
  if(!Cloud.available) return;
  const [cu,cp] = await Promise.all([Cloud.get(UKEY), Cloud.get(KEY)]);
  let pBlob=null, uBlob=null;
  try{ if(cp) pBlob=JSON.parse(cp); }catch(e){}
  try{ if(cu) uBlob=JSON.parse(cu); }catch(e){}
  if(pBlob){ prog = mergeProgress(prog, pBlob); save(true); }
  const hadUser = !!user;
  if(uBlob){ user = mergeUser(user, uBlob); if(user) saveUser(true); }
  return !hadUser && !!user; // true if a returning user just arrived from iCloud
}
async function init(){
  await loadContentInitial();   // populate DECKS/CARDS from cache or bundled seed
  prog = load();
  user = loadUser();
  if(Cloud.available){
    await reconcile();
    // live updates pushed from another device while the app is open
    Cloud.onChange(async ()=>{
      const arrived = await reconcile();
      if(arrived){ topics(); return; }
      if(nav.view==="topics") topics();
    });
  }
  if(!user) welcome();
  else topics();
  refreshContent();             // background: pull the live decks.json, refresh if newer
}
init();
</script>
