 {"id": "ct-denim", "name": "Denim", "kanji": "", "domain": "Fabric & Finish", "description": "A 3×1 twill weave, traditionally with indigo-dyed warp yarns and undyed weft. Weight ranges from 8 to 14 oz per square yard (most common 10–12 oz). One of the most traded cotton fabrics globally. Key specs: weight, yarn type (ring-spun vs OE), dye, and whether stretch elastane is required.", "example": "A denim brand's sourcing decision — ring-spun selvedge from a Japanese mill vs OE denim from a Bangladesh mill — creates a 10–15× price difference at fabric stage, fully explaining the retail price gap.", "q": "What are the key specifications a buyer sets when sourcing denim?", "a": "Weave (3×1 twill), weight (oz per sq yd), yarn type (ring-spun vs OE), dye type (indigo vs sulfur), and whether stretch (elastane %) is needed."},
 {"id": "ct-selvedge-denim", "name": "Selvedge denim", "kanji": "", "domain": "Fabric & Finish", "description": "Denim woven on vintage shuttle looms (typically 28–32 inches wide) that produce a natural, bound edge (selvedge) rather than a cut edge. Narrower loom, slower weave speed, denser fabric. The selvedge edge is turned out in trouser cuffs as a quality signal — a legible premium marker.", "example": "A Japanese denim mill's selvedge fabric at $40/m versus OE-spun modern denim at $4/m represents a 10× premium — the buyer is paying for weave architecture, provenance, and a specific customer who reads those details.", "q": "What makes selvedge denim structurally different from modern denim, and why the premium?", "a": "Woven on narrow shuttle looms producing a bound selvedge edge — slower, narrower, denser weave; the premium reflects architecture and provenance, not just fiber quality."},
 {"id": "ct-jersey-knit", "name": "Jersey knit", "kanji": "", "domain": "Fabric & Finish", "description": "A single-knit loop structure — one row of loops linked to the next — creating a stretchable fabric that does not require a selvedge. The base construction for T-shirts, underwear, and lightweight sportswear. Key specs: GSM, loop density, and yarn type (carded vs combed, OE vs ring-spun).", "example": "When a brand specs '180 gsm combed ring-spun jersey,' they are setting quality at the top of the mass market — heavier and smoother than fast fashion's 140 gsm carded OE equivalent.", "q": "Why is jersey a knit fabric while poplin is woven, and what does that mean for the buyer?", "a": "Jersey is formed by looping yarn rather than weaving — the result is stretch and drape without pattern-cutting constraints, but it requires different machinery and spec language than wovens."},
 {"id": "ct-mercerization", "name": "Mercerization", "kanji": "", "domain": "Fabric & Finish", "description": "A caustic soda (NaOH) treatment on cotton yarn or fabric that swells the fiber cross-section from kidney-shaped to round — permanently increasing luster, dye uptake, and tensile strength. Premium shirting fabrics are almost always mercerized. Adds 5–8% to fabric cost.", "example": "Comparing two 80s poplin fabrics side by side — one mercerized, one not — reveals a visible sheen difference under light and a 10–15% difference in dye depth at the same colorant cost.", "q": "What does mercerization do to cotton fiber and why do premium fabrics use it?", "a": "Caustic soda swells fibers to a rounder cross-section, permanently increasing luster, dye uptake, and strength — premium shirting requires it to achieve the right surface quality and color depth."},
 {"id": "ct-sanforization", "name": "Sanforization", "kanji": "", "domain": "Fabric & Finish", "description": "A mechanical pre-shrinking process — the fabric is moistened, fed through a rubber-belt compressor, and dried — reducing potential post-wash shrinkage to under 1%. Unsanforized fabric can shrink 5–8%, ruining graded pattern pieces in cut-and-sew production.", "example": "A CMT factory discovering mid-production that their fabric is unsanforized faces a crisis: pre-cut pattern pieces no longer fit post-wash samples, requiring either pattern re-grading or a full fabric reorder.", "q": "Why is sanforization non-negotiable for a cut-and-sew manufacturer?", "a": "Without it, fabric shrinks 5–8% after washing — pre-cut graded patterns no longer fit the shrunk fabric, ruining production accuracy."},
 {"id": "ct-enzyme-wash", "name": "Enzyme wash", "kanji": "", "domain": "Fabric & Finish", "description": "A finishing process using cellulase enzymes that biologically degrade surface cotton fibers — softening hand feel and, if run longer, creating a faded or distressed surface. Cheaper and less damaging than traditional stone washing. Common in premium casual and denim finishing.", "example": "A brand repositioning their chinos from corporate casual to weekend wear adds an enzyme wash in the finishing spec — same fabric construction, meaningfully softer handle, no structural compromise.", "q": "What does enzyme washing do to cotton fabric and why is it preferred over stone washing?", "a": "Cellulase enzymes degrade surface fibers to soften hand feel — preferred because it achieves the same softening without the mechanical damage and stone dust contamination of stone washing."},
 {"id": "ct-cotton-belt", "name": "Cotton Belt", "kanji": "", "domain": "Supply Chain", "description": "The major cotton-growing regions globally: the US (Texas, California, Arizona), India, China (Xinjiang), Brazil, Pakistan, and Australia. Each origin has a distinct price, staple profile, and compliance risk profile. Understanding origin matters for both quality and due diligence.", "example": "A sourcing manager building a UFLPA-compliant supply chain specifically excludes Chinese cotton without traceable non-Xinjiang origin documentation — origin awareness is now a legal requirement, not just a quality preference.", "q": "Why does origin matter in cotton sourcing beyond just price?", "a": "Each major growing region has a different staple profile, quality tier, and compliance risk — most critically, Chinese cotton carries a UFLPA forced-labor scrutiny that requires traceable documentation."},
 {"id": "ct-cotton-bale", "name": "Cotton bale", "kanji": "", "domain": "Supply Chain", "description": "The standard physical unit of trade in raw cotton — roughly 480 lbs (218 kg) in the US, 170 kg in India. Gin-compressed and banded for transport. MOQs for yarn spinning are quoted in bales; buyers need to understand origin-specific bale weight to accurately convert volume into cost.", "example": "A sourcing agent quoting '500 bales of Indian cotton' versus '500 bales of US cotton' is describing different total weights — conflating them creates a 25% calculation error in the purchasing volume.", "q": "Why does bale weight vary by origin and why does it matter commercially?", "a": "US bales are ~480 lbs, Indian bales ~170 kg — origin-standard weights mean '500 bales' represents different volumes depending on source, affecting cost and inventory calculations."},
 {"id": "ct-gin-turnout", "name": "Gin turnout", "kanji": "", "domain": "Supply Chain", "description": "The proportion of seed cotton (raw harvest) that becomes usable lint fiber after ginning — typically 33–40%, depending on variety and growing conditions. A key efficiency metric for farmers and ginners. Lower turnout means more raw cotton needed per pound of sellable fiber, raising the cost baseline.", "example": "A poor growing season dropping gin turnout from 38% to 33% does not just reduce yield — it raises the effective cost per pound of lint, flowing upstream into yarn and fabric prices within the same season.", "q": "What is gin turnout and why does it affect upstream fabric prices?", "a": "The % of seed cotton that becomes usable fiber (~33–40%); lower turnout means more raw cotton per pound of lint, raising the cost baseline for yarn and fabric."},
 {"id": "ct-spinning-mill", "name": "Spinning mill", "kanji": "", "domain": "Supply Chain", "description": "The factory stage that converts raw cotton fiber into yarn, concentrated in India, Pakistan, Bangladesh, and China. Spinning mills sell yarn by weight at prices quoted per kilogram by count. Their MOQs and lead times shape downstream fabric buying — specialty yarn capacity is highly concentrated.", "example": "A small brand sourcing Supima 80s combed ring-spun yarn will find only a handful of mills globally that can produce it — concentration at this stage creates supply risk and price leverage for the mill.", "q": "Where in the supply chain does a spinning mill sit, and what does it sell?", "a": "It converts raw cotton fiber into yarn — between ginning and fabric mill — selling yarn by kilogram at prices that vary by count, fiber type, and spinning method."},
 {"id": "ct-cmt", "name": "CMT (Cut, Make, Trim)", "kanji": "", "domain": "Supply Chain", "description": "A production model where the brand supplies the fabric and trims; the factory provides only labor, machinery, and finishing. The factory carries no material risk. Brands use CMT when they want control over fabric sourcing or when working with smaller factories that lack full FOB capability.", "example": "A brand working with an artisan workshop in Portugal typically uses CMT — the brand sources the fabric, ships it to the factory, and pays a per-garment sewing fee; quality control remains entirely with the brand.", "q": "What is CMT and who bears material sourcing risk in this model?", "a": "Cut, Make, Trim — the brand supplies fabric and trims; the factory only sews. The brand bears all material sourcing risk and quality control burden."},
 {"id": "ct-fob", "name": "FOB (Free on Board)", "kanji": "", "domain": "Supply Chain", "description": "An Incoterms shipping term where the seller is responsible for all costs and risk until the goods are loaded on the vessel at the origin port. After that point, the buyer bears all risk and freight cost. The most common import term for garments sourced from Asia.", "example": "A garment brand buying 'FOB Chittagong' is responsible for freight, insurance, and all risk from the moment goods are loaded at the Bangladesh port — their team must independently arrange forwarding and cargo insurance.", "q": "At what point in an FOB shipment does risk transfer from supplier to buyer?", "a": "When goods are loaded aboard the ship at the named origin port — from that point, all freight cost, insurance, and risk of loss is the buyer's."},
 {"id": "ct-strike-off", "name": "Strike-off", "kanji": "", "domain": "Supply Chain", "description": "A short production run of fabric in the approved specifications — color, weight, construction, finish — produced before the bulk order to allow buyer sign-off. Rejection at strike-off delays production by 4–6 weeks. Managing the strike-off calendar is a critical sourcing discipline.", "example": "A seasonal collection with 30 fabrics in 3 colorways requires 90 strike-off approvals — a sourcing team that does not stagger them against the production calendar will consistently miss delivery windows.", "q": "What is a strike-off and why does it create schedule risk?", "a": "A pre-bulk fabric sample produced to approved specs for buyer sign-off; rejection pushes the production start date 4–6 weeks, directly compressing the delivery window."},
 {"id": "ct-lead-time", "name": "Lead time", "kanji": "", "domain": "Supply Chain", "description": "Total elapsed time from order placement to goods delivered. Fiber to finished fabric is 90–120 days; full garment production (including fabric) is 120–180 days for most Asian suppliers. Fast-fashion brands compress this with air freight, pre-booked fabric, and near-shore sourcing.", "example": "A brand placing holiday orders in October is 6–8 weeks late for an Asian supplier — at 150-day lead time, holiday fabric should have been ordered in late June to hit an on-time December delivery.", "q": "Why must a brand's production calendar work backward from the retail delivery date?", "a": "Standard lead times of 120–180 days mean order placements must occur months before the delivery window — missing the order date compounds at every downstream stage."},
 {"id": "ct-moq", "name": "MOQ (Minimum Order Quantity)", "kanji": "", "domain": "Supply Chain", "description": "The minimum volume a mill or factory will accept per style, color, or fabric. Spinning mills quote in kilograms; fabric mills in meters; garment factories in units. MOQ reflects the economics of setup cost — below MOQ, the fixed cost of changeover makes the order unviable for the mill.", "example": "A startup brand building their first collection hits MOQ friction at every stage — a fabric mill requiring 500m per colorway forces them to over-stock, merge colorways, or pay a small-run surcharge.", "q": "What drives a mill's MOQ and what are the options when you are below it?", "a": "Setup cost recovery — changeovers are expensive, so mills need minimum volume to be profitable; options are: consolidate colorways, pay a small-run surcharge, or find a higher-cost mill with lower MOQ."},
 {"id": "ct-ice-futures", "name": "ICE cotton futures", "kanji": "", "domain": "Trade & Economics", "description": "The benchmark commodity price for US upland cotton, traded on the Intercontinental Exchange (ICE) in cents per pound — Contract #2 (CT) is the world reference. Cotton price volatility from weather, policy, and demand creates significant cost-of-goods risk for brands that do not hedge their exposure.", "example": "A brand that locked in fabric pricing at 70 cents per pound and now faces 95 cents at reorder has a 35% raw material cost increase embedded in their next collection — unhedged commodity exposure with nowhere to hide.", "q": "Why do large fashion brands track ICE cotton futures even if they do not trade them directly?", "a": "Cotton is a commodity — ICE futures signal where raw material costs are heading, and fabric and yarn prices follow with a lag; unhedged brands face margin compression when prices spike."},
 {"id": "ct-cotlook-index", "name": "Cotlook A-Index", "kanji": "", "domain": "Trade & Economics", "description": "The global benchmark for physical cotton prices, published daily by Cotlook Ltd — the average of the cheapest five origins of cotton offered for sale. Used in long-term supply contracts as the pricing reference. Different from ICE futures, which are US-centric and forward-looking.", "example": "A spinning mill contract referencing 'Cotlook A + 15 cents per pound for Supima' uses the A-Index as its base — the buyer must track A-Index movements to accurately forecast yarn costs across the contract term.", "q": "What is the Cotlook A-Index and how does it differ from ICE cotton futures?", "a": "A daily average of the cheapest five global origins in the physical market — it is the global spot reference, while ICE futures are US-centric forward-looking contracts."},
 {"id": "ct-value-chain-premium", "name": "Value-chain premium", "kanji": "", "domain": "Trade & Economics", "description": "The price multiplication at each step of the textile supply chain. Raw cotton at roughly $1 per pound becomes yarn at $3–5 per pound, fabric at $5–8 per meter, and a finished garment at $20–200+ at retail. Each stage adds labor, capital, and margin. Understanding where margin concentrates is central to supply chain negotiation.", "example": "A brand discovering a direct-mill sourcing opportunity — cutting out the fabric agent — can capture 15–25% of the agent margin, but must absorb the inventory risk the agent was carrying.", "q": "What drives price multiplication at each step of the textile supply chain?", "a": "Labor, capital equipment, processing cost, inventory risk, and margin at each stage — cotton to garment typically multiplies cost 20–100× from fiber to retail."},
 {"id": "ct-uflpa", "name": "UFLPA", "kanji": "", "domain": "Trade & Economics", "description": "The Uyghur Forced Labor Prevention Act (US, effective June 2022) creates a rebuttable presumption that goods produced wholly or in part in Xinjiang are made with forced labor and are therefore banned from US import. The burden of proof sits with the importer, not the government. Requires full supply chain traceability.", "example": "A US brand whose fabric mill sources cotton from Xinjiang without documentation faces CBP detention at the US border — without a third-party-verified audit trail, the goods do not enter the country.", "q": "What is the UFLPA's rebuttable presumption and who carries the burden of proof?", "a": "All goods from Xinjiang are presumed made with forced labor and banned; the importer must affirmatively prove otherwise — the burden is on the brand, not the government."},
 {"id": "ct-xinjiang", "name": "Xinjiang cotton", "kanji": "", "domain": "Trade & Economics", "description": "China's Xinjiang Uyghur Autonomous Region produces roughly 85% of China's cotton and 20–25% of world production. It is also the site of documented forced labor. The UFLPA creates a de facto ban on Xinjiang cotton for the US market, forcing supply chain redesign for brands serving both the US and China.", "example": "A brand sourcing 'Chinese cotton' without fiber-level traceability cannot assume it is Xinjiang-free — they need mill-level documentation proving origin, ideally with third-party audit, or they face US border risk.", "q": "Why does Xinjiang's market share create systemic compliance risk for global brands?", "a": "At ~25% of world production, Chinese cotton is nearly impossible to prove Xinjiang-free without fiber-level traceability — and the UFLPA puts the proof burden on the importer."},
 {"id": "ct-yarn-forward", "name": "Yarn-forward rule", "kanji": "", "domain": "Trade & Economics", "description": "A US FTA trade rule requiring that yarn, fabric, and garment all be made within the FTA partner countries for goods to qualify for zero tariffs. The strictest possible origin standard — and the reason why factories in Vietnam, for example, must source yarn domestically or from a qualifying country.", "example": "A Vietnam-based garment factory using Chinese yarn — even if the fabric is woven and the garment sewn in Vietnam — fails the yarn-forward test for US duty-free access. The brand must find a compliant yarn source or pay full tariff.", "q": "What is the yarn-forward rule and why does it reshape sourcing for factories in FTA countries?", "a": "An FTA origin requirement that yarn, fabric, and finished goods must all be made within FTA countries for duty-free access — Chinese yarn in a Vietnamese factory disqualifies the garment."},
 {"id": "ct-bangladesh-duty", "name": "Bangladesh duty advantage", "kanji": "", "domain": "Trade & Economics", "description": "Bangladesh exports garments to the EU at 0% duty under the Everything But Arms (EBA) preference, and to other markets under similar schemes. This structural cost advantage of roughly 12% versus China or Vietnam on EU-bound garments has built Bangladesh's ~$40B garment export industry.", "example": "A brand shifting EU-bound production from China to Bangladesh is not only chasing wage arbitrage — the 12% duty saving often exceeds the wage differential, making the move a straight economics decision.", "q": "What is Bangladesh's structural trade advantage for EU-bound garments and why does it matter?", "a": "Zero-duty access under EBA/GSP — a ~12% cost advantage over China or Vietnam that often outweighs any wage or logistics disadvantage."},
 {"id": "ct-gots", "name": "GOTS", "kanji": "", "domain": "Sustainability", "description": "Global Organic Textile Standard — the world's leading standard for organic textiles, covering the entire supply chain from fiber to finished product, including chemical inputs, wastewater, and labor practices. Third-party certification required at every stage: farm, spinning, fabric, finishing, and brand.", "example": "A brand using 'organic cotton' on a label without GOTS (or equivalent) certification is making an unverifiable claim — the certification is what backs the supply chain audit, not the fiber claim alone.", "q": "Why is GOTS considered the gold standard for organic textile claims?", "a": "It requires third-party certification at every supply chain stage — fiber, yarn, fabric, finishing, and brand — not just at the farm; the chain-of-custody is what makes the claim verifiable."},
 {"id": "ct-bci", "name": "BCI (Better Cotton)", "kanji": "", "domain": "Sustainability", "description": "Better Cotton Initiative — a mainstream sustainability program training farmers in more efficient practices (less water, fewer pesticides) without requiring full organic conversion. Uses 'mass balance' — BCI cotton is pooled in the supply chain, so the actual fiber in any specific garment may not come from a BCI-trained farm.", "example": "A major fast-fashion brand saying 'we source Better Cotton' is reporting a supply chain investment program, not certifying any specific garment's fiber — mass balance makes product-level claims technically meaningless.", "q": "What is the core limitation of BCI as a sustainability claim on a garment?", "a": "Mass balance — BCI cotton is pooled and mixed, so the fiber in any specific garment may not come from a BCI-trained farm; it is a system-level investment, not a product-level certification."},
 {"id": "ct-oeko-tex", "name": "OEKO-TEX Standard 100", "kanji": "", "domain": "Sustainability", "description": "A testing standard (not an organic certification) that verifies finished fabric or garment contains no harmful substances above safe levels — no formaldehyde, no heavy metals, no banned azo dyes. Applies to both conventional and organic cotton. Addresses chemical safety, not agricultural practice.", "example": "A brand launching a baby clothing line specifies OEKO-TEX 100 on every fabric — not to make an organic claim, but to verify that no harmful finishes are present in fabric that will touch infant skin.", "q": "How does OEKO-TEX Standard 100 differ from GOTS in what it certifies?", "a": "OEKO-TEX tests for the absence of harmful substances in the finished product — it is a chemical safety standard, not an organic or supply chain standard; GOTS covers both."},
 {"id": "ct-water-footprint", "name": "Water footprint of cotton", "kanji": "", "domain": "Sustainability", "description": "Growing 1 kg of cotton requires roughly 10,000–20,000 liters of water — around 10,000 liters on the industry average. A single pair of jeans uses approximately 7,000–8,000 liters. Cotton is one of the most water-intensive crops globally, and is often grown in water-stressed regions.", "example": "A brand calculating Scope 3 water impact on their denim line finds the number dominated by raw fiber — shifting even a portion to recycled or rain-fed cotton has a disproportionate impact on the water metric.", "q": "Why is water footprint a significant risk factor in cotton sourcing?", "a": "At ~10,000L per kg of fiber, cotton is among the most water-intensive crops — grown in water-stressed regions, creating both ecological risk and future supply risk for brands reliant on irrigated cotton."},
 {"id": "ct-aral-sea", "name": "Aral Sea collapse", "kanji": "", "domain": "Sustainability", "description": "The Aral Sea in Central Asia was once the world's fourth-largest lake. Soviet irrigation for cotton farming in Uzbekistan and Kazakhstan diverted its two feeder rivers — by the 1990s, 90% of the sea had evaporated, leaving salt flats and a regional ecological and public health catastrophe. The defining case study of cotton's water risk.", "example": "The Aral Sea is the business case for water footprint analysis — the cotton-growing region gained short-term agricultural output at the cost of the regional climate, fishing industry, and public health for generations.", "q": "What does the Aral Sea collapse illustrate about cotton's water risk?", "a": "Irrigation for cotton farming drained one of the world's largest lakes — it is the canonical example of how cotton's water intensity, if unmanaged at scale, causes irreversible ecological and economic collapse."},
 {"id": "ct-organic-cotton", "name": "Organic cotton", "kanji": "", "domain": "Sustainability", "description": "Cotton grown without synthetic pesticides, herbicides, or fertilizers, and with non-GMO seeds — certified by accredited bodies like GOTS or OCS. Only roughly 1% of world cotton production. Typically commands a 20–50% fiber price premium. Requires a 3-year farmland conversion period.", "example": "A brand sourcing 100% organic cotton at scale will find supply highly constrained — significant certified organic volume exists mainly in India, Turkey, and Tanzania, concentrating supply among a small set of mills.", "q": "Why does organic cotton represent only ~1% of production despite growing demand?", "a": "Three-year conversion periods, 20–25% yield reductions versus conventional, and premium economics that only some markets will absorb — supply is structurally constrained by the cost and time of conversion."},
 {"id": "ct-recycled-cotton", "name": "Recycled cotton", "kanji": "", "domain": "Sustainability", "description": "Post-industrial or post-consumer cotton fabric is mechanically shredded back into fiber. The process cuts fiber length significantly — recycled cotton staple is much shorter than virgin, reducing tensile strength. Must be blended with virgin fiber (typically 30–70% recycled) to maintain yarn integrity.", "example": "A brand using 50% mechanically recycled cotton on their T-shirts reduces virgin fiber use, but the yarn is coarser than 100% virgin equivalent — visible and tactile differences must be acceptable to the consumer or masked by construction.", "q": "What is the key technical limitation of mechanically recycled cotton?", "a": "Shredding cuts fiber length — recycled staple is much shorter than virgin, reducing strength and quality; blending with virgin fiber is required, limiting how high the recycled content can go."},
 {"id": "ct-poly-blend", "name": "Cotton-polyester blend", "kanji": "", "domain": "Sustainability", "description": "Blends of cotton and polyester (typically 65/35 or 50/50) balance performance and cost: polyester adds wrinkle resistance, shape retention, and moisture wicking; cotton adds breathability and comfort. The blend is cheaper than 100% cotton at the same weight — but blended fabrics cannot be recycled via standard textile recycling streams.", "example": "A workwear brand choosing 65/35 over 100% cotton gets no-iron performance at 20% lower fabric cost — but closes off any future circularity story, since the blend cannot be mechanically or chemically recycled.", "q": "What is the commercial trade-off of a cotton-polyester blend versus 100% cotton?", "a": "Lower cost and better performance (wrinkle resistance, shape retention) — but the blend is essentially unrecyclable with current technology, foreclosing any circularity claims."}
];

const COURSES = [
  {id:"japanese", label:"🇯🇵 Japanese", domains:["Manufacturing","Craft","Aesthetics","Philosophy","Life"]},
  {id:"cotton",   label:"🧵 Cotton", domains:["Fiber & Yarn","Fabric & Finish","Supply Chain","Trade & Economics","Sustainability"]},
];
let activeCourse = COURSES[0];
function courseCards(){return CARDS.filter(c=>activeCourse.domains.includes(c.domain))}

const KEY="dojo.progress.v1";
const DAY=864e5, MIN=6e4, INT=[0,1,3,7,16,30];
let prog = load();
let nav = {view:"home"};
const $=s=>document.getElementById(s);
function load(){try{return JSON.parse(localStorage.getItem(KEY))||{}}catch(e){return{}}}
function save(){localStorage.setItem(KEY,JSON.stringify(prog))}

const DOMAINS = [...new Set(CARDS.map(c=>c.domain))];
const inDomain = d => CARDS.filter(c=>c.domain===d);
function seen(id){const p=prog[id];return p&&p.seen}
function statusOf(id){const p=prog[id];if(!p||!p.seen)return"unseen";return p.r||"unseen"}
function isDue(id){const p=prog[id];if(!p||!p.seen)return false;return (p.due||0)<=Date.now()}
function isNew(id){return !seen(id)}
function knownCount(list){return list.filter(c=>statusOf(c.id)==="known").length}
function dueList(list){return list.filter(c=>isDue(c.id))}
function newList(list){return list.filter(c=>isNew(c.id))}
function dontKnowList(list){
  return list
    .filter(c=>statusOf(c.id)==="new")
    .sort((a,b)=>(prog[a.id]&&prog[a.id].due||0)-(prog[b.id]&&prog[b.id].due||0));
}

function rate(id,r){
  const p = prog[id] || {box:0,seen:0};
  if(r==="known"){p.box=Math.min((p.box||0)+1,5);p.due=Date.now()+INT[p.box]*DAY;}
  else if(r==="heard"){p.box=Math.max(p.box||0,1);p.due=Date.now()+1*DAY;}
  else {p.box=0;p.due=Date.now()+10*MIN;}
  p.r=r;p.seen=(p.seen||0)+1;p.last=Date.now();
  prog[id]=p;save();
}
function nextLabel(id){
  const p=prog[id];if(!p||!p.seen)return"new";
  const d=p.due-Date.now();
  if(d<=0)return"due now";
  const days=Math.round(d/DAY);
  if(days<1)return"today";
  if(days<30)return days+"d";
  return Math.round(days/30)+"mo";
}
function duePhrase(id){
  const p=prog[id];if(!p)return"";
  const d=p.due-Date.now();const days=Math.round(d/DAY);
  if(d<=0)return"now";if(days<1)return"later today";if(days===1)return"tomorrow";
  if(days<30)return"in "+days+" days";return"in "+Math.round(days/30)+" months";
}

/* ---------- HOME ---------- */
function home(){
  nav={view:"home"};
  const cc=courseCards(), known=knownCount(cc), due=dueList(cc).length, dk=dontKnowList(cc).length;
  const tabs=COURSES.map(c=>`<button class="tab${c===activeCourse?' active':''}" data-course="${c.id}">${c.label}</button>`).join('');
  let h=`<div class="hdr"><h1>Dōjō</h1><span class="sub">${cc.length} cards</span></div>
  <div class="pad">
  <div class="tabs">${tabs}</div>
  <div class="stats">
    <div class="stat"><b>${known}</b><span>known</span></div>
    <div class="stat"><b>${dk}</b><span>don't know</span></div>
    <div class="stat"><b>${due}</b><span>due now</span></div>
  </div>`;
  if(due>0) h+=`<button class="cta" data-act="reviewall">Review due · ${due} →</button>`;
  else h+=`<button class="cta" data-act="learnall">Start learning →</button>`;
  if(dk>0) h+=`<button class="cta dk" data-act="learnunknown">Teach me what I don't know · ${dk} →</button>`;
  h+=`<div class="sectitle">Categories</div><div class="catlist">`;
  activeCourse.domains.forEach(d=>{
    const list=inDomain(d), k=knownCount(list), du=dueList(list).length;
    const pct=Math.round(k/list.length*100);
    h+=`<button class="row catrow" data-dom="${d}">
      <span class="cname">${d}</span>
      <span class="cnum">${k}/${list.length} known</span>
      ${du>0?`<span class="duebadge">${du} due</span>`:""}
      <span class="chev">›</span>
      <span class="bar"><i style="width:${pct}%"></i></span>
    </button>`;
  });
  h+=`</div>
  <div class="legend">
    <span><i class="dot"></i>new</span><span><i class="dot new"></i>don't know</span>
    <span><i class="dot heard"></i>heard of</span><span><i class="dot known"></i>known</span>
  </div>
  <button class="iconbtn" data-act="reset" style="display:block;margin:6px auto 0">reset progress</button>
  </div>`;
  render(h);
  $("app").querySelectorAll("[data-course]").forEach(b=>b.onclick=()=>{
    activeCourse=COURSES.find(c=>c.id===b.dataset.course)||COURSES[0];home();
  });
  $("app").querySelectorAll("[data-dom]").forEach(b=>b.onclick=()=>category(b.dataset.dom));
  bindActs();
}

/* ---------- CATEGORY ---------- */
function category(d){
  nav={view:"category",dom:d};
  const list=inDomain(d), k=knownCount(list), du=dueList(list).length, nw=newList(list).length;
  let h=`<div class="hdr"><button class="back" data-act="home">‹</button><h1 style="font-size:28px">${d}</h1></div>
  <div class="pad">
  <div class="stats">
    <div class="stat"><b>${k}/${list.length}</b><span>known</span></div>
    <div class="stat"><b>${du}</b><span>due now</span></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px">
    <button class="cta soft" data-act="learncat" ${nw?"":"disabled"}>Learn new · ${nw}</button>
    <button class="cta soft" data-act="reviewcat" ${du?"":"disabled"}>Review due · ${du}</button>
  </div>
  <div class="sectitle">All cards — tap any to study</div>
  <div class="cardlist">`;
  list.forEach(c=>{
    h+=`<button class="row" data-id="${c.id}">
      <span class="dot ${statusOf(c.id)==="unseen"?"":statusOf(c.id)}"></span>
      <span class="cr-main"><span class="cr-name">${c.name}<em>${c.kanji||""}</em></span></span>
      <span class="cr-next ${isDue(c.id)?"cr-due":""}">${nextLabel(c.id)}</span>
    </button>`;
  });
  h+=`</div></div>`;
  render(h);
  $("app").querySelectorAll("[data-id]").forEach(b=>b.onclick=()=>startSession([b.dataset.id],{ret:"category",dom:d}));
  bindActs();
}

/* ---------- STUDY SESSION ---------- */
let sess=null;
function startSession(ids,opts){
  if(!ids.length)return;
  sess={ids, i:0, ret:opts.ret, dom:opts.dom, flipped:false};
  nav={view:"study"};
  study();
}
function study(){
  const c=CARDS.find(x=>x.id===sess.ids[sess.i]);
  const total=sess.ids.length;
  let h=`<div class="hdr"><button class="back" data-act="exit">‹</button><span class="sub" style="flex:1;text-align:center">${sess.i+1} / ${total}</span><span style="width:24px"></span></div>
  <div class="study">
    <div class="scard" id="scard">
      <div class="center">
        <div class="kanji">${c.kanji||""}</div>
        <div class="sname">${c.name}</div>
        <button class="say" id="saybtn" aria-label="Pronounce ${c.name}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M19 5a9 9 0 0 1 0 14"/></svg><span>say it</span></button>
        <div class="sdom">${c.domain}</div>
        <div class="sstatus">${seen(c.id)?("last: "+labelOf(statusOf(c.id))+" · review "+duePhrase(c.id)):"new card"}</div>
      </div>
      <div id="rev" class="back-rev" style="display:none">
        <div class="lbl">What it means</div><p>${esc(c.description)}</p>
        <div class="lbl">In practice</div><p>${esc(c.example)}</p>
        <div class="lbl">Test yourself</div><p>${esc(c.q)}</p>
      </div>
      <div class="hint" id="hint">tap to reveal · or just rate it</div>
    </div>
    <div class="ratebar">
      <button class="r-known" data-r="known">Known<small>solid</small></button>
      <button class="r-heard" data-r="heard">Heard of<small>vaguely</small></button>
      <button class="r-new" data-r="new">Don't know<small>teach me</small></button>
    </div>
  </div>`;
  render(h);
  $("scard").onclick=flip;
  const sb=$("saybtn");if(sb)sb.onclick=e=>{e.stopPropagation();say(c.kanji||c.name)};
  $("app").querySelectorAll(".ratebar button").forEach(b=>b.onclick=()=>doRate(c,b.dataset.r));
  bindActs();
}
function flip(){
  if(sess.flipped)return;
  sess.flipped=true;
  $("rev").style.display="block";$("hint").style.display="none";
}
function advance(){
  if(sess.i < sess.ids.length-1){ sess.i++; sess.flipped=false; study(); return; }
  const multi=sess.ids.length>1, ret=sess.ret, dom=sess.dom, n=sess.ids.length; sess=null;
  if(multi) doneScreen(n,ret,dom);
  else if(ret==="category"&&dom) category(dom);
  else home();
}
function teach(c){
  if(!sess.flipped){
    sess.flipped=true;
    const rev=$("rev"); if(rev) rev.style.display="block";
    const hint=$("hint"); if(hint) hint.style.display="none";
  }
  const rb=$("app").querySelector(".ratebar");
  if(rb) rb.innerHTML=`<button class="cta" id="gotit" style="margin:0;border-radius:13px;grid-column:1/-1">Got it — keep going →</button>`;
  const g=$("gotit"); if(g) g.onclick=advance;
}
function doRate(c,r){
  rate(c.id,r);
  if(r==="new"){teach(c);return;}
  advance();
}
function doneScreen(n,ret,dom){
  nav={view:"done",dom:dom,ret:ret};
  render(`<div class="hdr"><h1 style="font-size:28px">Nice work</h1></div>
    <div class="empty"><div class="big">🍵</div><p>You went through ${n} card${n>1?"s":""}.</p>
    <button class="cta" data-act="${ret==='category'?'backcat':'home'}" style="max-width:240px">Back</button></div>`);
  bindActs();
}
function exitSession(){
  const ret=sess?sess.ret:"home", dom=sess?sess.dom:null; sess=null;
  if(ret==="category"&&dom)category(dom);else home();
}
function labelOf(r){return r==="known"?"Known":r==="heard"?"Heard of":r==="new"?"Don't know":"new"}

/* ---------- helpers ---------- */
function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function say(text){
  try{
    if(!("speechSynthesis" in window)||!text)return;
    const u=new SpeechSynthesisUtterance(text);
    u.lang="ja-JP";u.rate=.85;
    const vs=speechSynthesis.getVoices();
    const jv=vs.find(v=>/ja[-_]?JP/i.test(v.lang))||vs.find(v=>/japan/i.test(v.name));
    if(jv)u.voice=jv;
    speechSynthesis.cancel();speechSynthesis.speak(u);
  }catch(e){}
}
function render(h){$("app").innerHTML=h}
function bindActs(){
  $("app").querySelectorAll("[data-act]").forEach(b=>{
    const a=b.dataset.act;
    b.onclick=()=>{
      if(a==="home")home();
      else if(a==="backcat")category(nav.dom);
      else if(a==="reviewall")startSession(dueList(courseCards()).map(c=>c.id),{ret:"home"});
      else if(a==="learnall")startSession(newList(courseCards()).slice(0,20).map(c=>c.id),{ret:"home"});
      else if(a==="learnunknown")startSession(dontKnowList(courseCards()).map(c=>c.id),{ret:"home"});
      else if(a==="learncat")startSession(newList(inDomain(nav.dom)).map(c=>c.id),{ret:"category",dom:nav.dom});
      else if(a==="reviewcat")startSession(dueList(inDomain(nav.dom)).map(c=>c.id),{ret:"category",dom:nav.dom});
      else if(a==="exit")exitSession();
      else if(a==="reset"){if(confirm("Reset all your progress?")){prog={};save();home();}}
    };
  });
}
home();
</script>
</body>
</html>
