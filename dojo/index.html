<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#faf6ee">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Dōjō">
<title>Dōjō</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#faf6ee;--card:#ffffff;--ink:#26241f;--muted:#7c766a;--line:rgba(38,36,31,.22);--shadow:0 1px 3px rgba(38,36,31,.10),0 1px 2px rgba(38,36,31,.06);
    --accent:#c2562f;--accent-soft:#f6e4dc;
    --unseen:#bdb8ac;--new:#c0573a;--heard:#c8952a;--known:#4a8a5c;
    --bk-bg:#e7efe4;--bk-fg:#3c6c49;--hd-bg:#f4ead3;--hd-fg:#846017;--nk-bg:#f4e3db;--nk-fg:#9a472b;
    --safe-top:env(safe-area-inset-top);--safe-bot:env(safe-area-inset-bottom);
  }
  @media (prefers-color-scheme:dark){
    :root{--paper:#15140f;--card:#262218;--ink:#f0ebe0;--muted:#a39c8c;--line:rgba(240,235,224,.24);--shadow:0 1px 3px rgba(0,0,0,.5);
      --accent:#e0925c;--accent-soft:#3a221c;--unseen:#5f5a4e;
      --bk-bg:#26352b;--bk-fg:#86bd95;--hd-bg:#352f1f;--hd-fg:#d6b066;--nk-bg:#382520;--nk-fg:#e0967a;}
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{background:var(--paper);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;line-height:1.5}
  #app{max-width:560px;margin:0 auto;min-height:100svh;display:flex;flex-direction:column;
    padding:calc(var(--safe-top) + 10px) 16px 0}
  .hdr{display:flex;align-items:center;gap:10px;margin:2px 0 14px;min-height:34px}
  .hdr h1{font-family:"Caveat",cursive;font-size:34px;margin:0;flex:1}
  .hdr .sub{font-size:13px;color:var(--muted)}
  .back{background:none;border:none;color:var(--ink);font-size:26px;line-height:1;padding:0 8px 0 0;cursor:pointer}
  .iconbtn{background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;padding:6px;text-decoration:underline}

  .pad{padding-bottom:calc(var(--safe-bot) + 16px)}
  .stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;box-shadow:var(--shadow)}
  .stat b{font-size:24px;display:block;line-height:1.1}
  .stat span{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}

  .cta{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;border:none;
    background:var(--accent);color:#fff;border-radius:14px;padding:15px;font-size:16px;font-weight:600;
    cursor:pointer;margin-bottom:18px;font-family:inherit}
  .cta.soft{background:var(--card);color:var(--ink);border:1px solid var(--line)}
  .cta.dk{background:var(--nk-bg);color:var(--nk-fg)}
  .cta:disabled{opacity:.45}

  .sectitle{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin:4px 2px 8px}
  .catlist,.cardlist{display:flex;flex-direction:column;gap:9px}
  .row{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);
    border-radius:14px;padding:13px 14px;cursor:pointer;text-align:left;width:100%;color:inherit;font-family:inherit;box-shadow:var(--shadow)}
  .row:active{transform:scale(.99)}
  .catrow{flex-wrap:wrap}
  .catrow .cname{font-size:17px;font-weight:600;flex:1}
  .catrow .cnum{font-size:13px;color:var(--muted)}
  .duebadge{font-size:12px;font-weight:600;color:var(--accent);background:var(--accent-soft);
    border-radius:999px;padding:2px 9px;margin-left:8px}
  .bar{flex-basis:100%;height:5px;background:var(--line);border-radius:5px;overflow:hidden;margin-top:4px}
  .bar i{display:block;height:100%;background:var(--known)}
  .chev{color:var(--muted);font-size:20px}

  .dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;background:var(--unseen)}
  .dot.new{background:var(--new)}.dot.heard{background:var(--heard)}.dot.known{background:var(--known)}
  .cr-main{flex:1;min-width:0}
  .cr-name{font-size:16px;font-weight:600}
  .cr-name em{font-style:normal;color:var(--muted);font-weight:400;margin-left:6px}
  .cr-next{font-size:12px;color:var(--muted)}
  .cr-due{color:var(--accent);font-weight:600}

  .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin:14px 2px;justify-content:center}
  .legend span{display:flex;align-items:center;gap:5px}

  /* STUDY */
  .study{flex:1;display:flex;flex-direction:column}
  .scard{background:var(--card);border:1px solid var(--line);border-radius:20px;
    padding:24px 20px 22px;cursor:pointer;min-height:190px;margin-bottom:6px;box-shadow:var(--shadow)}
  .scard .center{text-align:center}
  .kanji{font-size:52px;color:var(--accent);line-height:1;margin-bottom:8px}
  .sname{font-family:"Caveat",cursive;font-size:40px;line-height:1;margin-bottom:4px}
  .say{display:inline-flex;align-items:center;gap:5px;background:var(--card);border:1px solid var(--line);
    color:var(--muted);border-radius:999px;padding:5px 12px;font-size:13px;cursor:pointer;font-family:inherit;margin-bottom:8px;box-shadow:var(--shadow)}
  .say svg{width:15px;height:15px}
  .say:active{transform:scale(.96)}
  .sdom{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
  .sstatus{font-size:12px;color:var(--muted);margin-top:10px}
  .back-rev{text-align:left}
  .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--accent);font-weight:600;margin:16px 0 3px}
  .back-rev p{margin:0;font-size:16px}
  .hint{color:var(--muted);font-size:14px;text-align:center;margin-top:18px}
  /* always-visible, pinned rating bar */
  .ratebar{position:sticky;bottom:0;z-index:5;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;
    background:var(--paper);border-top:1px solid var(--line);
    padding:10px 0 calc(var(--safe-bot) + 8px);margin-top:auto}
  .ratebar button{border:1px solid transparent;border-radius:13px;padding:13px 4px;font-weight:600;
    font-size:14px;cursor:pointer;font-family:inherit;line-height:1.2}
  .ratebar button:active{transform:scale(.97)}
  .ratebar small{display:block;font-weight:400;opacity:.8;font-size:10px;margin-top:2px}
  .r-known{background:var(--bk-bg);color:var(--bk-fg)}
  .r-heard{background:var(--hd-bg);color:var(--hd-fg)}
  .r-new{background:var(--nk-bg);color:var(--nk-fg)}

  .empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;text-align:center;color:var(--muted);padding-bottom:40px}
  .empty .big{font-size:42px}
  .spacer{flex:1}
  .tabs{display:flex;gap:8px;margin-bottom:16px}
  .tab{flex:1;border:1px solid var(--line);background:var(--card);color:var(--muted);border-radius:12px;padding:10px 8px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;line-height:1.2}
  .tab.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}
</style>
</head>
<body>
<div id="app"></div>
<script>
const CARDS = [
 {"id": "gemba", "name": "Gemba", "kanji": "現場", "domain": "Manufacturing", "description": "Gemba means 'the actual place' where real work happens and value is created. The principle is that managers should go to where the work is rather than rely on reports.", "example": "Instead of reviewing a slide deck about declining call-center performance, a consultant sits on the floor listening to live calls to see what is actually slowing agents down.", "q": "What is Gemba and why does it matter to a manager?", "a": "Gemba is the real place where work happens; managers should go there directly because the truth of a problem lives at the source, not in reports."},
 {"id": "genchi-genbutsu", "name": "Genchi genbutsu", "kanji": "現地現物", "domain": "Manufacturing", "description": "Genchi genbutsu means 'go and see the real thing yourself' to understand a situation based on first-hand observation. It is the act of personally verifying facts at the source.", "example": "Before recommending a warehouse layout change, the consultant walks the actual floor and watches pickers move, rather than trusting the inventory system's assumptions.", "q": "How does genchi genbutsu differ from reading a status report?", "a": "It requires you to personally observe the real object or process at its location, replacing second-hand summaries with direct evidence."},
 {"id": "san-gen-shugi", "name": "San-gen shugi", "kanji": "三現主義", "domain": "Manufacturing", "description": "San-gen shugi is the 'three reals' principle: go to the real place, look at the real thing, and grasp the real facts. It is the disciplined habit of grounding decisions in observed reality.", "example": "In a quality investigation, the team examines the defective part on the actual line and gathers the real data before assigning a root cause.", "q": "Name the three 'reals' in san-gen shugi.", "a": "Real place (genba), real thing (genbutsu), and real facts (genjitsu) — decisions grounded in all three."},
 {"id": "kaizen", "name": "Kaizen", "kanji": "改善", "domain": "Manufacturing", "description": "Kaizen is continuous, small improvement made by everyone, every day. It treats progress as a steady accumulation of minor refinements rather than occasional big leaps.", "example": "A finance team holds a weekly fifteen-minute huddle where each member proposes one small tweak to speed up the monthly close.", "q": "What distinguishes kaizen from a one-off improvement project?", "a": "Kaizen is ongoing and participatory — small daily improvements driven by everyone, not a single large initiative."},
 {"id": "kaikaku", "name": "Kaikaku", "kanji": "改革", "domain": "Manufacturing", "description": "Kaikaku is radical, step-change reform, in contrast to incremental kaizen. It is a deliberate transformation that breaks with the existing way of working.", "example": "A retailer replaces its entire legacy supply chain with a new distributed-fulfillment model in one bold redesign rather than tweaking the old one.", "q": "When would a leader choose kaikaku over kaizen?", "a": "When incremental gains are insufficient and the situation calls for a bold, radical break — a step-change rather than steady refinement."},
 {"id": "kanban", "name": "Kanban", "kanji": "看板", "domain": "Manufacturing", "description": "Kanban uses visual cards or signals to pull work through a process just in time. Work is only started when downstream demand signals a need for it.", "example": "A consulting project office uses a visual board where new analysis is only pulled in when a reviewer frees up, preventing work-in-progress pileups.", "q": "What does a kanban signal trigger in a pull system?", "a": "It signals that downstream capacity or demand exists, authorizing upstream work to begin only when needed."},
 {"id": "just-in-time", "name": "Just-in-time", "kanji": "", "domain": "Manufacturing", "description": "Just-in-time means producing only what is needed, when it is needed, in the amount needed. It minimizes inventory and exposes problems quickly.", "example": "A manufacturer schedules component deliveries to arrive hours before assembly, freeing working capital that was tied up in stockpiled parts.", "q": "What is the core goal of just-in-time production?", "a": "To make and move only what is needed, when needed, eliminating excess inventory and surfacing problems fast."},
 {"id": "jidoka", "name": "Jidoka", "kanji": "自働化", "domain": "Manufacturing", "description": "Jidoka is automation with a human touch: machines that detect a defect and stop themselves automatically. It prevents bad output from flowing downstream and frees people from watching machines.", "example": "An automated invoice-processing system halts and flags any transaction that fails a validation rule, rather than passing the error along.", "q": "What does a jidoka-enabled machine do when it detects a defect?", "a": "It stops itself automatically and signals for attention, so defects are caught at the source rather than propagated."},
 {"id": "andon", "name": "Andon", "kanji": "行灯", "domain": "Manufacturing", "description": "Andon is a visual signal system that lets any worker stop the line when a problem appears, often by pulling a cord. It empowers frontline staff to halt work and trigger immediate help.", "example": "In a service operations team, any agent can flag a recurring system glitch that immediately escalates to a supervisor instead of being ignored.", "q": "Scenario: a line worker spots a defect mid-shift. What does andon let them do?", "a": "It empowers them to stop the line immediately and call for help, so the problem is fixed at once rather than buried."},
 {"id": "poka-yoke", "name": "Poka-yoke", "kanji": "ポカヨケ", "domain": "Manufacturing", "description": "Poka-yoke is mistake-proofing: designing a process or product so errors become impossible or immediately obvious. It builds quality into the design rather than relying on vigilance.", "example": "An expense system that refuses to submit a claim missing a receipt eliminates a common compliance error by design.", "q": "What is poka-yoke and what does it prevent?", "a": "Poka-yoke is design that makes mistakes impossible or self-evident, preventing human error rather than catching it afterward."},
 {"id": "muda-mura-muri", "name": "Muda, mura, muri", "kanji": "無駄・斑・無理", "domain": "Manufacturing", "description": "These are the three enemies of lean: muda (waste), mura (unevenness), and muri (overburden). Eliminating all three together produces a smooth, efficient flow.", "example": "A consultant diagnoses a back office finding muda in redundant approvals, mura in lumpy month-end spikes, and muri in chronically overloaded staff.", "q": "Name and define the three Ms targeted in lean.", "a": "Muda (waste), mura (unevenness in flow), and muri (overburden on people or equipment)."},
 {"id": "heijunka", "name": "Heijunka", "kanji": "平準化", "domain": "Manufacturing", "description": "Heijunka is production leveling: smoothing out the type and volume of work over time. It reduces the peaks and troughs that create overburden and waste.", "example": "A claims department spreads predictable end-of-month volume across the weeks to avoid a stressful spike and idle stretches.", "q": "What problem does heijunka solve?", "a": "It levels uneven demand and workload over time, removing the spikes and lulls that cause overburden and waste."},
 {"id": "takt-time", "name": "Takt time", "kanji": "タクトタイム", "domain": "Manufacturing", "description": "Takt time is the pace of production set to match customer demand. It tells you how fast each unit must be completed to meet demand without over- or under-producing.", "example": "If a service team must resolve 80 tickets in an 8-hour day, takt time is 6 minutes per ticket, setting the rhythm for staffing.", "q": "How is takt time calculated?", "a": "Available working time divided by customer demand in that period — it sets the required pace per unit."},
 {"id": "standardized-work", "name": "Standardized work", "kanji": "標準作業", "domain": "Manufacturing", "description": "Standardized work is the current best, agreed, repeatable method for a task. It creates a stable baseline that makes improvement and training possible.", "example": "A firm documents the single best way to onboard a new analyst so every office delivers a consistent experience and improvements can be measured.", "q": "Why is standardized work the foundation for kaizen?", "a": "Without a stable, documented baseline there is nothing to measure improvements against; standardized work makes change visible and repeatable."},
 {"id": "5s", "name": "5S", "kanji": "整理整頓", "domain": "Manufacturing", "description": "5S is a workplace organization method: sort, set in order, shine, standardize, and sustain. It creates clean, orderly, efficient workspaces that reveal problems.", "example": "A team applies 5S to its shared drives and trackers, removing dead files and standardizing folders so anyone can find documents in seconds.", "q": "List the five steps of 5S.", "a": "Sort, set in order, shine, standardize, and sustain."},
 {"id": "hoshin-kanri", "name": "Hoshin kanri", "kanji": "方針管理", "domain": "Manufacturing", "description": "Hoshin kanri is policy deployment: aligning the whole organization to a few critical strategic goals. It cascades top priorities into coordinated action at every level.", "example": "A CEO sets three breakthrough objectives for the year, and each division translates them into specific targets so everyone pulls in the same direction.", "q": "What is the purpose of hoshin kanri?", "a": "To align the entire organization around a small number of vital strategic goals and cascade them into coordinated action."},
 {"id": "nemawashi", "name": "Nemawashi", "kanji": "根回し", "domain": "Manufacturing", "description": "Nemawashi is the practice of quietly building consensus and laying groundwork before a formal decision. It gathers buy-in informally so the eventual decision is smooth and durable.", "example": "Before proposing a reorg in the steering committee, the partner has private one-on-one chats with each key stakeholder to surface objections early.", "q": "Scenario: you want a contentious proposal approved smoothly. How does nemawashi help?", "a": "By building informal consensus and addressing concerns with stakeholders beforehand, so the formal decision faces little resistance."},
 {"id": "ringi", "name": "Ringi", "kanji": "稟議", "domain": "Manufacturing", "description": "Ringi is a formal process of circulating a written proposal for collective review and sign-off. Approvers add their seal as the document moves through the organization.", "example": "A capital expenditure request is documented and routed through each relevant manager for endorsement before final authorization.", "q": "What is ringi and how does it secure a decision?", "a": "It circulates a written proposal for sequential collective sign-off, building shared ownership and formal approval as it moves."},
 {"id": "hansei", "name": "Hansei", "kanji": "反省", "domain": "Manufacturing", "description": "Hansei is honest, self-critical reflection on what fell short, even after a success. The goal is to acknowledge shortcomings openly so they can be improved next time.", "example": "After winning a project, the team still runs a hansei review to name what went poorly and commit to fixing it on the next engagement.", "q": "How does hansei differ from a celebratory post-mortem?", "a": "Hansei deliberately focuses on what fell short and what must improve, with honest self-criticism, even when the outcome was good."},
 {"id": "yokoten", "name": "Yokoten", "kanji": "横展", "domain": "Manufacturing", "description": "Yokoten is the horizontal spreading of a good practice or lesson across teams and sites. It ensures that an improvement made in one place is replicated everywhere it applies.", "example": "When one regional office finds a faster proposal template, yokoten ensures every other office adopts it rather than reinventing the wheel.", "q": "What does yokoten ensure happens to a successful local improvement?", "a": "It spreads the practice sideways to other teams and sites so the whole organization benefits, not just where it originated."},
 {"id": "obeya", "name": "Obeya", "kanji": "大部屋", "domain": "Manufacturing", "description": "Obeya means 'big room' where a cross-functional team gathers with shared visual information to manage a project. Co-locating people and data speeds up communication and decisions.", "example": "A transformation program runs from a war room walled with live dashboards, so leaders from every function decide together in real time.", "q": "What is the benefit of an obeya?", "a": "It co-locates a cross-functional team with shared visual information, accelerating communication, alignment, and decisions."},
 {"id": "kata", "name": "Kata", "kanji": "型", "domain": "Manufacturing", "description": "Kata is capability built through daily, deliberate practice of a defined routine, as in improvement kata and coaching kata. Repeated practiced form turns a behavior into a reliable habit.", "example": "A manager practices a daily improvement routine with each team member, building problem-solving into muscle memory rather than treating it as an event.", "q": "How does kata build organizational capability?", "a": "Through repeated, deliberate practice of a structured routine, embedding improvement and coaching behaviors as habit."},
 {"id": "monozukuri", "name": "Monozukuri", "kanji": "ものづくり", "domain": "Manufacturing", "description": "Monozukuri is the craft and spirit of making things well, blending skill, pride, and continuous improvement. It treats manufacturing as an art of dedicated craftsmanship.", "example": "A premium appliance maker competes on the felt quality and integrity of how its products are built, not just on cost or features.", "q": "What does monozukuri emphasize beyond mere production?", "a": "The craft, pride, and spirit of making things well — manufacturing as dedicated craftsmanship, not just output."},
 {"id": "kotozukuri", "name": "Kotozukuri", "kanji": "ことづくり", "domain": "Manufacturing", "description": "Kotozukuri is creating experiences and value, not just physical objects. It shifts focus from the product itself to the meaning and service surrounding it.", "example": "A carmaker moves from selling vehicles to offering mobility experiences and connected services, competing on the whole customer journey.", "q": "How does kotozukuri extend the idea of monozukuri?", "a": "It focuses on creating experiences, services, and value around products rather than only making the objects themselves."},
 {"id": "karakuri", "name": "Karakuri", "kanji": "からくり", "domain": "Manufacturing", "description": "Karakuri is clever, low-cost mechanical automation that uses gravity, levers, and simple mechanisms instead of expensive power or electronics. It achieves smart results with minimal investment.", "example": "A warehouse installs gravity-fed roller racks that reposition stock automatically, cutting handling effort without buying robotics.", "q": "What makes karakuri distinct from conventional automation?", "a": "It uses simple, low-cost mechanical devices (gravity, levers, cams) rather than costly powered or electronic systems."},
 {"id": "jishuken", "name": "Jishuken", "kanji": "自主研", "domain": "Manufacturing", "description": "Jishuken are autonomous, self-led improvement study groups where teams tackle real problems together. They build deep capability through hands-on, peer-driven learning.", "example": "A group of operations managers forms a self-directed study circle to crack a recurring throughput bottleneck across their units.", "q": "What is a jishuken?", "a": "An autonomous, self-led study group that works on real improvement problems to build capability through hands-on learning."},
 {"id": "shojinka", "name": "Shōjinka", "kanji": "省人化", "domain": "Manufacturing", "description": "Shōjinka is flexible manpower: the ability to scale the number of workers up or down to match demand. It keeps labor aligned with actual workload rather than fixed staffing.", "example": "A contact center cross-trains staff so it can flex headcount on a line up or down as call volume rises and falls through the day.", "q": "What does shōjinka allow an operation to do with its labor?", "a": "Flex the workforce up or down to match demand, keeping staffing aligned with actual workload through cross-training and flexible deployment."},
 {"id": "takumi", "name": "Takumi", "kanji": "匠", "domain": "Craft", "description": "The master artisan's skill, refined to the point where the work seems effortless. It names both the person and the rare level of ability they possess.", "example": "A senior engineer who can debug a system by intuition after decades of practice embodies takumi; companies often pair such a person with juniors to transfer hard-won judgment.", "q": "What does 'takumi' refer to?", "a": "The master artisan and their highly refined, almost intuitive skill."},
 {"id": "shokunin", "name": "Shokunin", "kanji": "職人", "domain": "Craft", "description": "The craftsman who is devoted to the work itself, not just its rewards. The focus is on doing the job excellently for its own sake.", "example": "A developer who keeps improving an internal tool nobody praises, purely because it should be done right, is acting as a shokunin.", "q": "A worker polishes a task no one will notice, simply because it deserves to be done well. Which concept is this?", "a": "Shokunin: the craftsman devoted to the work itself rather than the reward."},
 {"id": "shokunin-kishitsu", "name": "Shokunin kishitsu", "kanji": "職人気質", "domain": "Craft", "description": "The craftsman's temperament or spirit: pride, stubbornness about quality, and refusal to cut corners. It is the inner character behind the skilled hands.", "example": "A founder who rejects a profitable but shoddy product line because it falls short of their standard is showing shokunin kishitsu.", "q": "What is 'shokunin kishitsu'?", "a": "The craftsman's temperament or spirit, marked by pride and an uncompromising attitude toward quality."},
 {"id": "meijin", "name": "Meijin", "kanji": "名人", "domain": "Craft", "description": "A recognized master, someone publicly acknowledged as being among the best in their field. The status is earned through demonstrated excellence over time.", "example": "In a career, becoming the go-to expert whom peers across the industry cite by name is the equivalent of being a meijin.", "q": "What distinguishes a 'meijin' from a merely skilled person?", "a": "A meijin is publicly recognized as a master, not just privately competent."},
 {"id": "kodawari", "name": "Kodawari", "kanji": "こだわり", "domain": "Craft", "description": "Uncompromising devotion to detail, an insistence on getting small things exactly right. It can be a near-obsessive commitment to one's standards.", "example": "A designer who spends hours tuning the spacing on a single button has kodawari; this attention is often what separates a good product from a beloved one.", "q": "What does 'kodawari' mean?", "a": "An uncompromising, sometimes obsessive devotion to getting details exactly right."},
 {"id": "waza", "name": "Waza", "kanji": "技", "domain": "Craft", "description": "Technique, or embodied skill that lives in the body rather than in words. It is knowledge you can perform but not always explain.", "example": "A salesperson's feel for when to close a deal is waza: skill built into instinct through repetition, hard to teach in a manual.", "q": "What kind of knowledge is 'waza'?", "a": "Embodied technique or skill that resides in the body and is hard to express in words."},
 {"id": "do", "name": "Do", "kanji": "道", "domain": "Craft", "description": "A craft pursued as a lifelong 'Way' of mastery, signaled by the -do suffix. It frames a skill as a path of continuous self-development, not just a job.", "example": "Treating your profession as a 'way' rather than a paycheck, where each year deepens both skill and character, applies the spirit of do.", "q": "What does the suffix '-do' (Way) imply about a craft?", "a": "That the craft is a lifelong path of mastery and self-cultivation, not merely a task."},
 {"id": "geido", "name": "Geido", "kanji": "芸道", "domain": "Craft", "description": "The artistic 'Way': the pursuit of an art form as a disciplined lifelong path. It applies the philosophy of do specifically to artistic practice.", "example": "A musician who treats performance as endless refinement of self and art, not just technique, is following geido.", "q": "What is 'geido'?", "a": "The artistic 'Way', pursuing an art form as a disciplined, lifelong path of mastery."},
 {"id": "shu-ha-ri", "name": "Shu-ha-ri", "kanji": "守破離", "domain": "Craft", "description": "A three-stage model of mastery: first obey the form, then break from it, then transcend it. It describes how a learner moves from imitation to innovation.", "example": "A new manager first follows the playbook exactly (shu), later adapts it to their team (ha), and eventually creates their own approach (ri).", "q": "What are the three stages of 'shu-ha-ri'?", "a": "Obey the form (shu), break from it (ha), then transcend it to find your own way (ri)."},
 {"id": "keiko", "name": "Keiko", "kanji": "稽古", "domain": "Craft", "description": "Disciplined, repeated practice carried out over long stretches of time. It treats steady drilling, not bursts of talent, as the engine of skill.", "example": "A coder who does deliberate practice exercises daily, even when busy, is doing keiko; the compounding repetition builds durable ability.", "q": "What does 'keiko' emphasize about how skill is built?", "a": "Through disciplined, repeated practice sustained over time rather than occasional effort."},
 {"id": "sensei-deshi", "name": "Sensei & deshi", "kanji": "先生・弟子", "domain": "Craft", "description": "The master-apprentice bond, a close relationship through which skill and values are transmitted. The deshi learns by serving and observing the sensei over years.", "example": "A formal mentorship where a junior shadows a senior leader for years, absorbing judgment beyond what any course teaches, mirrors the sensei-deshi bond.", "q": "What relationship do 'sensei' and 'deshi' describe?", "a": "The master (sensei) and apprentice (deshi) bond through which skill and values are passed down."},
 {"id": "onko-chishin", "name": "Onko chishin", "kanji": "温故知新", "domain": "Craft", "description": "Learning from the old to understand the new: studying tradition and past knowledge to gain fresh insight. The past becomes a source of innovation, not a constraint.", "example": "A product team that revisits decades-old design classics to spark a modern feature is practicing onko chishin.", "q": "What does 'onko chishin' advise?", "a": "Study and learn from the old in order to understand and create the new."},
 {"id": "kufu", "name": "Kufu", "kanji": "工夫", "domain": "Craft", "description": "Inventive ingenuity: the act of devising a cleverer, better way to do something. It is resourceful problem-solving through thought and experimentation.", "example": "An operator who rigs a simple jig to cut assembly time in half is showing kufu; such grassroots ingenuity drives continuous improvement.", "q": "A worker invents a small clever fix that makes a task much easier. Which concept fits?", "a": "Kufu: inventive ingenuity, devising a better way to do something."},
 {"id": "tezukuri", "name": "Tezukuri", "kanji": "手作り", "domain": "Craft", "description": "Handmade, made by hand with care and personal attention. It values the human touch and effort behind an object over mass production.", "example": "A small bakery marketing its breads as tezukuri signals care and authenticity that machine-made goods can't claim.", "q": "What does 'tezukuri' mean?", "a": "Handmade, created by hand with care and personal attention."},
 {"id": "teinei", "name": "Teinei", "kanji": "丁寧", "domain": "Craft", "description": "Careful, thorough, and attentive doing, with politeness and respect in the work. It means treating each step deliberately rather than rushing.", "example": "Writing a clear, well-structured handoff document instead of a hasty note is working in a teinei way, and it earns trust from colleagues.", "q": "What does 'teinei' describe?", "a": "Doing something carefully, thoroughly, and attentively, with respect for the task."},
 {"id": "chado", "name": "Chado", "kanji": "茶道", "domain": "Craft", "description": "The way of tea: the tea ceremony practiced as a discipline of ritual, presence, and mastery. Every gesture is refined through long practice toward calm attentiveness.", "example": "The disciplined attention chado demands mirrors how a professional learns to be fully present in a high-stakes meeting rather than distracted.", "q": "What is 'chado'?", "a": "The way of tea, the tea ceremony pursued as a discipline of ritual, presence, and mastery."},
 {"id": "shodo", "name": "Shodo", "kanji": "書道", "domain": "Craft", "description": "Calligraphy practiced as a discipline of the brush. It treats writing as an art requiring control, focus, and years of refinement.", "example": "Like shodo, where a single stroke can't be corrected, some professional skills demand getting it right in one decisive, well-practiced motion.", "q": "What is 'shodo'?", "a": "Calligraphy pursued as a disciplined art of the brush."},
 {"id": "kado-ikebana", "name": "Kado / ikebana", "kanji": "華道・生け花", "domain": "Craft", "description": "Flower arranging practiced as a Way, with attention to balance, space, and form. It elevates arrangement into a disciplined aesthetic practice.", "example": "The way ikebana uses empty space deliberately teaches a lesson designers apply: what you leave out shapes the result as much as what you include.", "q": "What is 'kado' (ikebana)?", "a": "Flower arranging practiced as a Way, disciplined attention to balance, space, and form."},
 {"id": "kyudo", "name": "Kyudo", "kanji": "弓道", "domain": "Craft", "description": "Archery practiced as a Way of mind and form, where correct form matters more than the hit. Mastery is measured by the quality of the process, not only the result.", "example": "Kyudo's lesson, that perfecting your process produces good outcomes, applies to careers: focus on doing the work right and results tend to follow.", "q": "In 'kyudo', what is valued over simply hitting the target?", "a": "Correct form and state of mind; the quality of the process matters more than the result."},
 {"id": "bonsai", "name": "Bonsai", "kanji": "盆栽", "domain": "Craft", "description": "The art of cultivating a miniature tree patiently over decades. It rewards long-term, incremental shaping rather than quick results.", "example": "Building a career or a company is like bonsai: small, patient adjustments over many years produce something that can't be rushed into existence.", "q": "What quality does 'bonsai' most embody?", "a": "Patient, long-term cultivation, shaping something gradually over decades."},
 {"id": "honmono", "name": "Honmono", "kanji": "本物", "domain": "Craft", "description": "The genuine article: something authentic and real, as opposed to a fake or imitation. It signals true quality and integrity.", "example": "A brand earns the label honmono when its quality is real rather than marketed, and customers can tell the difference over time.", "q": "What does 'honmono' mean?", "a": "The genuine article, something authentic and real rather than imitation."},
 {"id": "suki", "name": "Suki", "kanji": "数寄", "domain": "Craft", "description": "Refined devotion to an art, an aesthetic passion for pursuing it deeply. It describes the cultivated taste and dedication of a true enthusiast.", "example": "A leader with suki for their craft invests in mastery beyond what the job requires, and that depth shows in the quality of their output.", "q": "What is 'suki' (数寄)?", "a": "A refined, aesthetic devotion to and passion for an art."},
 {"id": "keizoku-wa-chikara-nari", "name": "Keizoku wa chikara nari", "kanji": "継続は力なり", "domain": "Craft", "description": "The saying that persistence is power: continuing steadily over time builds real strength. Consistency, not intensity, is the source of achievement.", "example": "Shipping a small improvement every week, sustained for years, compounds into a dominant product, the workplace proof that keizoku wa chikara nari.", "q": "What is the meaning of 'keizoku wa chikara nari'?", "a": "Persistence is power; continuing steadily over time is itself a source of strength."},
 {"id": "wabi-sabi", "name": "Wabi-sabi", "kanji": "侘寂", "domain": "Aesthetics", "description": "The view that beauty lives in imperfection, impermanence, and incompleteness. It values the worn, the asymmetric, and the modest over the polished and permanent.", "example": "A product page that photographs a hand-thrown ceramic mug with its uneven glaze and slight wobble, rather than a flawless machined one, sells the soul of the object.", "q": "What is wabi-sabi?", "a": "Finding beauty in imperfection, impermanence, and incompleteness rather than in flawless polish or permanence."},
 {"id": "ma", "name": "Ma", "kanji": "間", "domain": "Aesthetics", "description": "The active power of empty space, gaps, and pauses. The interval between things carries as much meaning as the things themselves.", "example": "In a slide deck, putting a single sentence on an otherwise blank slide and pausing lets ma do the work, giving the idea room to land.", "q": "How does ma differ from simply leaving things blank?", "a": "Ma treats the gap or pause as an active, meaningful element, not mere absence; the interval shapes how everything around it is felt."},
 {"id": "yohaku-no-bi", "name": "Yohaku no bi", "kanji": "余白の美", "domain": "Aesthetics", "description": "The beauty of deliberate empty space in a composition. Negative space is left intentionally to frame and elevate what is present.", "example": "A poster that places a small logo in a vast field of white space lets the emptiness draw the eye and signal confidence.", "q": "What is yohaku no bi?", "a": "The aesthetic of deliberate, beautiful empty space that frames and elevates the elements actually placed in a composition."},
 {"id": "kanso", "name": "Kanso", "kanji": "簡素", "domain": "Aesthetics", "description": "Simplicity achieved by stripping away the non-essential. Clarity and economy of means are the goal.", "example": "Redesigning a checkout flow to remove every optional field and button until only the essential steps remain is kanso in practice.", "q": "What is kanso?", "a": "Simplicity through elimination, reducing a design to its essentials and removing the unnecessary."},
 {"id": "fukinsei", "name": "Fukinsei", "kanji": "不均整", "domain": "Aesthetics", "description": "Beauty found in asymmetry and irregularity. Balance is achieved without strict symmetry, creating a sense of natural life.", "example": "An off-center hero image balanced by a small block of text on the opposite side feels more alive than a perfectly mirrored layout.", "q": "Why might a designer choose fukinsei over symmetry?", "a": "Asymmetry and irregularity create dynamic, natural-feeling balance and avoid the static rigidity of perfect symmetry."},
 {"id": "shizen", "name": "Shizen", "kanji": "自然", "domain": "Aesthetics", "description": "Naturalness, free of pretense or contrivance. Things appear as if they arose on their own rather than being forced.", "example": "A garden path that curves the way a person would naturally walk, instead of a forced geometric line, embodies shizen.", "q": "What is shizen in design?", "a": "Naturalness without pretense or contrivance, so a design feels effortless and unforced rather than artificially imposed."},
 {"id": "shibumi", "name": "Shibumi / shibui", "kanji": "渋み・渋い", "domain": "Aesthetics", "description": "Understated, elegant restraint. A quiet refinement that reveals its depth slowly rather than announcing itself.", "example": "A luxury watch with a plain matte dial and no logo flash relies on shibui; its quality is felt rather than shouted.", "q": "What is shibui (shibumi)?", "a": "Understated, restrained elegance whose refinement and depth reveal themselves quietly over time."},
 {"id": "yugen", "name": "Yugen", "kanji": "幽玄", "domain": "Aesthetics", "description": "A profound, subtle grace that points beyond what can be said. It evokes a sense of mystery and depth too deep for words.", "example": "A film poster that hints at a story through fog and a distant silhouette, rather than spelling it out, trades on yugen.", "q": "What feeling does yugen aim to evoke?", "a": "A profound, mysterious grace that suggests depth beyond words and leaves something to the imagination."},
 {"id": "datsuzoku", "name": "Datsuzoku", "kanji": "脱俗", "domain": "Aesthetics", "description": "Freedom from convention and routine; the welcome surprise. It breaks expected patterns to refresh perception.", "example": "A brand that interrupts a grid of identical product shots with one unexpected, playful image uses datsuzoku to wake the viewer up.", "q": "A layout follows a strict, predictable grid and feels lifeless. Which principle could revive it?", "a": "Datsuzoku, by breaking free from the convention with an unexpected element that surprises and refreshes the eye."},
 {"id": "seijaku", "name": "Seijaku", "kanji": "静寂", "domain": "Aesthetics", "description": "Energized calm and active stillness. A tranquility that feels alive and composed rather than empty or dead.", "example": "A meditation app's home screen with slow, quiet motion and muted tones creates seijaku, calm that still feels present and engaged.", "q": "What is seijaku?", "a": "Energized calm or active stillness, a tranquility that is alive and composed rather than merely empty."},
 {"id": "iki", "name": "Iki", "kanji": "粋", "domain": "Aesthetics", "description": "Refined, understated chic with a touch of effortless cool. It is stylish in a spontaneous, unfussy way.", "example": "A clothing line that pairs a plain garment with one subtle, knowing detail captures iki, chic that never tries too hard.", "q": "What is iki?", "a": "Refined, understated chic, an effortless and stylish cool that avoids being overdone."},
 {"id": "miyabi", "name": "Miyabi", "kanji": "雅", "domain": "Aesthetics", "description": "Courtly elegance and polished refinement. It removes the crude and rustic in favor of grace and sophistication.", "example": "A wedding invitation with delicate type, soft palette, and careful proportions aims for miyabi, the polish of courtly elegance.", "q": "How does miyabi differ from wabi-sabi?", "a": "Miyabi seeks polished, courtly refinement and removes the rough, whereas wabi-sabi embraces rustic imperfection."},
 {"id": "mono-no-aware", "name": "Mono no aware", "kanji": "物の哀れ", "domain": "Aesthetics", "description": "The tender, bittersweet awareness of impermanence. A gentle sadness that things, and we, are fleeting.", "example": "A campaign built around cherry blossoms at peak bloom evokes mono no aware, the poignant beauty made sharper because it will soon pass.", "q": "What emotion is at the heart of mono no aware?", "a": "A tender, bittersweet sadness arising from awareness of the impermanence of things."},
 {"id": "kintsugi", "name": "Kintsugi", "kanji": "金継ぎ", "domain": "Aesthetics", "description": "The craft of mending broken pottery with gold so the repair is highlighted, not hidden. The break becomes part of the object's beauty and history.", "example": "A product story that openly shows how a flaw was fixed, rather than concealing it, applies the kintsugi idea of honoring the mend.", "q": "What does kintsugi teach about flaws?", "a": "That breaks and repairs should be honored and made visible, becoming part of an object's beauty and history rather than something to hide."},
 {"id": "notan", "name": "Notan", "kanji": "濃淡", "domain": "Aesthetics", "description": "The harmonious balance of light and dark areas in a composition. It treats positive and negative tones as interdependent.", "example": "Designing a logo by first checking that its black and white masses balance, before adding any detail, is working with notan.", "q": "What does notan concern in a composition?", "a": "The balance and interplay of light and dark areas, treating positive and negative tones as a harmonious whole."},
 {"id": "shakkei", "name": "Shakkei", "kanji": "借景", "domain": "Aesthetics", "description": "\"Borrowed scenery\": designing a space to incorporate a distant view as part of the composition. The far landscape becomes an element of the near design.", "example": "Framing a cafe window so a distant mountain reads as part of the interior decor is shakkei, borrowing the outside view into the design.", "q": "What is shakkei?", "a": "Borrowed scenery: composing a space so a distant external view becomes an intentional part of the design."},
 {"id": "tokonoma", "name": "Tokonoma", "kanji": "床の間", "domain": "Aesthetics", "description": "A recessed alcove that frames and presents a single chosen object, such as a scroll or flower. It gives one item focused attention.", "example": "A storefront vitrine that displays just one product under a spotlight works like a tokonoma, framing a single object for full attention.", "q": "What is the design function of a tokonoma?", "a": "To frame and elevate a single chosen object in a dedicated space, focusing all attention on it."},
 {"id": "engawa", "name": "Engawa", "kanji": "縁側", "domain": "Aesthetics", "description": "The veranda or in-between space that mediates inside and outside. It is a threshold that belongs to both realms.", "example": "A homepage's hero band that blends the brand's world with a call to enter the product acts like an engawa, a transitional threshold between outside and in.", "q": "What kind of space is an engawa?", "a": "An in-between threshold space, like a veranda, that mediates and connects interior and exterior."},
 {"id": "enso", "name": "Enso", "kanji": "円相", "domain": "Aesthetics", "description": "The Zen circle drawn in a single brushstroke. It expresses enlightenment, the moment, and the beauty of the imperfect gesture.", "example": "A brand mark made from one confident, slightly open brush circle channels enso, valuing the living gesture over geometric perfection.", "q": "What does the enso symbolize?", "a": "The single-brushstroke Zen circle expressing the present moment, enlightenment, and beauty in an imperfect, spontaneous gesture."},
 {"id": "komorebi", "name": "Komorebi", "kanji": "木漏れ日", "domain": "Aesthetics", "description": "The dappled sunlight that filters through tree leaves. It names a fleeting, gentle play of light and shadow.", "example": "A spa website using soft, scattered light overlays to suggest komorebi creates a calm, natural, dappled mood.", "q": "What is komorebi?", "a": "The dappled, shifting sunlight that filters through tree leaves, a gentle interplay of light and shadow."},
 {"id": "boro", "name": "Boro", "kanji": "襤褸", "domain": "Aesthetics", "description": "Beauty in textiles that have been mended, patched, and worn over time. The accumulated repairs tell a story of use and thrift.", "example": "A fashion label that sells visibly patched, layered denim leans on boro, where the mends and wear are the point.", "q": "What does boro find beautiful?", "a": "Worn, mended, and patched textiles whose accumulated repairs and history of use are their beauty."},
 {"id": "mitate", "name": "Mitate", "kanji": "見立て", "domain": "Aesthetics", "description": "Creative re-seeing, where one thing stands in for or is reinterpreted as another. It finds new meaning by viewing the familiar in a fresh role.", "example": "Using a stone as a stool, or an everyday object as a vase in a product shot, is mitate, re-seeing one thing as another.", "q": "A designer presents an ordinary object as if it were something else entirely. Which principle is at play?", "a": "Mitate, the creative re-seeing that lets one thing stand in for or be reinterpreted as another."},
 {"id": "jimi", "name": "Jimi", "kanji": "地味", "domain": "Aesthetics", "description": "Understated plainness, the quiet opposite of flashy (hade). It favors modest, sober, unshowy expression.", "example": "A muted, minimal packaging design that deliberately avoids loud colors and gloss expresses jimi rather than hade.", "q": "What is jimi, and what is it contrasted with?", "a": "Jimi is understated, modest plainness, contrasted with hade, the flashy and showy."},
 {"id": "zen", "name": "Zen", "kanji": "禅", "domain": "Philosophy", "description": "A school of Buddhism that seeks direct insight through practice and experience rather than doctrine or scripture.", "example": "A leader who trusts hands-on practice over endless theorizing embodies Zen, learning by doing the work instead of debating it.", "q": "What is Zen?", "a": "Direct insight gained through practice and lived experience, not through doctrine or study."},
 {"id": "zazen", "name": "Zazen", "kanji": "座禅", "domain": "Philosophy", "description": "Seated meditation, the core practice of Zen, focused on stillness and observing the breath and mind.", "example": "A few minutes of zazen before a high-stakes meeting can settle a racing mind and sharpen focus.", "q": "What is zazen and what is it for?", "a": "Seated meditation in Zen; it trains stillness and clear, settled attention."},
 {"id": "mu", "name": "Mu", "kanji": "無", "domain": "Philosophy", "description": "Emptiness or nothingness; the absence of fixed, separate essence in things.", "example": "When you let go of rigid assumptions about how a project 'must' go, you make room for Mu and can respond to what is actually there.", "q": "What does Mu refer to?", "a": "Emptiness or nothingness; the lack of fixed, separate essence."},
 {"id": "satori", "name": "Satori", "kanji": "悟り", "domain": "Philosophy", "description": "A sudden flash of awakening or deep insight into reality.", "example": "After weeks stuck on a problem, the answer arrives in a sudden, whole moment of clarity, a small taste of satori.", "q": "What is satori?", "a": "A sudden moment of awakening or deep insight."},
 {"id": "kensho", "name": "Kenshō", "kanji": "見性", "domain": "Philosophy", "description": "A brief glimpse of one's true nature, an initial awakening that is often partial or fleeting.", "example": "A brief, clear moment where you sense who you really are beneath your roles is kenshō, a glimpse rather than a permanent shift.", "q": "How does kenshō differ from satori?", "a": "Kenshō is a brief glimpse of one's true nature; satori is a fuller, more lasting awakening."},
 {"id": "mushin", "name": "Mushin", "kanji": "無心", "domain": "Philosophy", "description": "No-mind; a state of effortless action free from hesitation, fear, or self-conscious thought.", "example": "A skilled presenter in mushin responds to questions fluidly, without freezing or overthinking each word.", "q": "You react perfectly to a sudden change without stopping to think. Which concept is this?", "a": "Mushin, no-mind, effortless action in flow without self-conscious thought."},
 {"id": "shoshin", "name": "Shoshin", "kanji": "初心", "domain": "Philosophy", "description": "Beginner's mind; approaching things with openness, curiosity, and freedom from preconceptions.", "example": "An expert who keeps shoshin still asks basic questions, staying open to learning instead of assuming they already know.", "q": "What is shoshin?", "a": "Beginner's mind; an open, curious attitude free of fixed preconceptions."},
 {"id": "zanshin", "name": "Zanshin", "kanji": "残心", "domain": "Philosophy", "description": "Relaxed, lingering awareness that continues after an action is completed.", "example": "After sending a critical email, staying alert to the reply and consequences instead of mentally checking out is zanshin.", "q": "What is zanshin?", "a": "Relaxed, sustained awareness that lingers after an action is finished."},
 {"id": "fudoshin", "name": "Fudōshin", "kanji": "不動心", "domain": "Philosophy", "description": "The immovable, unshakeable mind that stays steady amid provocation or chaos.", "example": "A leader with fudōshin stays composed when a crisis hits, neither panicking nor lashing out.", "q": "A crisis erupts and everyone panics, but one leader stays steady. Which concept fits?", "a": "Fudōshin, the immovable, unshakeable mind under pressure."},
 {"id": "heijoshin", "name": "Heijōshin", "kanji": "平常心", "domain": "Philosophy", "description": "An everyday, calm and ordinary mind maintained even under pressure.", "example": "Treating a championship moment like any normal day of practice keeps your performance steady through heijōshin.", "q": "How does heijōshin differ from fudōshin?", "a": "Heijōshin is keeping a normal, everyday calm under pressure; fudōshin is a mind that cannot be moved or shaken at all."},
 {"id": "kokoro", "name": "Kokoro", "kanji": "心", "domain": "Philosophy", "description": "Heart-mind; the unity of feeling, thought, and spirit as a single whole.", "example": "A decision made with kokoro weighs both the analysis and how it feels to the people involved, not just the spreadsheet.", "q": "What does kokoro mean?", "a": "Heart-mind; feeling and intellect experienced as one unified whole."},
 {"id": "seishin", "name": "Seishin", "kanji": "精神", "domain": "Philosophy", "description": "Spirit or mental fortitude; the inner strength and willpower to endure and persevere.", "example": "Pushing through the final hard stretch of a long project draws on seishin, the mental toughness to keep going.", "q": "What is seishin?", "a": "Spirit or mental fortitude; the inner willpower to persevere."},
 {"id": "musubi", "name": "Musubi", "kanji": "結び", "domain": "Philosophy", "description": "In Shinto, the sacred force that binds, connects, and brings things into creation.", "example": "Seeing a team's output as more than the sum of individuals, born from how they connect, reflects the spirit of musubi.", "q": "What is musubi in Shinto thought?", "a": "The sacred force that connects, binds, and creates."},
 {"id": "yamato-damashii", "name": "Yamato-damashii", "kanji": "大和魂", "domain": "Philosophy", "description": "The 'Japanese spirit'; a cultural ideal of native character, resilience, and devotion.", "example": "Invoked to rally collective resolve and perseverance, yamato-damashii frames hardship as something to be met with shared spirit.", "q": "What does yamato-damashii refer to?", "a": "The 'Japanese spirit'; an ideal of native character, resilience, and devotion."},
 {"id": "ikigai", "name": "Ikigai", "kanji": "生き甲斐", "domain": "Life", "description": "Your reason for being; the source of purpose that makes getting up each morning feel worthwhile.", "example": "A leader who clarifies their own ikigai can anchor decisions to a deeper purpose, which steadies them through setbacks and inspires the team to follow.", "q": "What is ikigai?", "a": "One's reason for being, the sense of purpose that makes daily life feel meaningful and worth pursuing."},
 {"id": "wa", "name": "Wa", "kanji": "和", "domain": "Life", "description": "Harmony as a social ideal, prizing group cohesion and smooth relationships over individual assertion.", "example": "A manager who protects wa builds consensus before announcing a change, so the team feels included rather than steamrolled.", "q": "Why might a Japanese team avoid open confrontation in a meeting?", "a": "To preserve wa, the harmony of the group, by keeping relationships smooth and avoiding disruptive conflict."},
 {"id": "bushido", "name": "Bushido", "kanji": "武士道", "domain": "Life", "description": "The warrior's ethical code, emphasizing honor, loyalty, courage, and self-discipline.", "example": "A resilient leader draws on the bushido spirit by holding to principles under pressure rather than bending for convenience.", "q": "What is bushido?", "a": "The samurai ethical code built on honor, loyalty, courage, and disciplined self-mastery."},
 {"id": "giri", "name": "Giri", "kanji": "義理", "domain": "Life", "description": "A sense of duty and obligation to others, the social bonds one is expected to honor.", "example": "Showing up to support a colleague's project because they once helped you reflects giri, the quiet ledger that keeps relationships strong.", "q": "What is giri?", "a": "Duty and obligation to others, the felt responsibility to repay and honor social bonds."},
 {"id": "on", "name": "On", "kanji": "恩", "domain": "Life", "description": "A debt of gratitude one carries toward those who have given help or kindness.", "example": "A mentee who feels on toward a mentor pays it forward by guiding the next generation, sustaining a chain of generosity.", "q": "How does on differ from a simple favor?", "a": "On is a lasting debt of gratitude one carries, not a one-off exchange, creating an enduring sense of indebtedness."},
 {"id": "ninjo", "name": "Ninjo", "kanji": "人情", "domain": "Life", "description": "Human feeling and compassion, the warmth and empathy people naturally feel for one another.", "example": "A leader who balances rules with ninjo bends a policy to support an employee going through a hard time, earning lasting loyalty.", "q": "What tension does ninjo often sit in against giri?", "a": "Ninjo is natural human compassion, which can pull against giri, the obligation of duty, when the heart and social rules disagree."},
 {"id": "makoto", "name": "Makoto", "kanji": "誠", "domain": "Life", "description": "Sincerity and integrity, the alignment of one's words, deeds, and inner intent.", "example": "A trusted leader practices makoto by saying only what they mean and then doing exactly what they said.", "q": "What is makoto?", "a": "Sincerity and integrity, the consistency between word, deed, and true intention."},
 {"id": "rei", "name": "Rei", "kanji": "礼", "domain": "Life", "description": "Courtesy and respect expressed through conduct, manners, and gesture.", "example": "Greeting every team member properly and acknowledging their contributions shows rei, the respect that lubricates daily working relationships.", "q": "What is rei?", "a": "Courtesy and respect made visible in one's conduct, manners, and considerate behavior toward others."},
 {"id": "honne-tatemae", "name": "Honne to tatemae", "kanji": "本音・建前", "domain": "Life", "description": "The distinction between private true feelings (honne) and the public face one presents (tatemae).", "example": "A leader reads the gap between a team's polite agreement (tatemae) and their real reservations (honne) by creating safe one-on-one spaces.", "q": "A colleague nods agreement in the meeting but seems unconvinced. What concept explains this?", "a": "Honne and tatemae, the difference between private true feeling and the public face presented to keep harmony."},
 {"id": "amae", "name": "Amae", "kanji": "甘え", "domain": "Life", "description": "Accepted, indulgent interdependence, the comfort of relying on another's goodwill.", "example": "Healthy team trust includes a measure of amae, where members lean on each other for support without fear of judgment.", "q": "What is amae?", "a": "A trusting, indulgent interdependence in which one comfortably relies on another's care and acceptance."},
 {"id": "enryo", "name": "Enryo", "kanji": "遠慮", "domain": "Life", "description": "Considerate restraint, holding back one's own wants out of regard for others.", "example": "A senior leader practices enryo by staying quiet early in a discussion so junior voices feel free to speak first.", "q": "What is enryo?", "a": "Considerate self-restraint, holding back one's preferences or actions out of regard for others."},
 {"id": "meiwaku", "name": "Meiwaku", "kanji": "迷惑", "domain": "Life", "description": "The trouble or burden one might impose on others, and the duty to avoid causing it.", "example": "A reliable teammate avoids meiwaku by finishing their part on time so no one downstream is left scrambling.", "q": "What does avoiding meiwaku mean in daily life?", "a": "Acting so as not to burden or inconvenience others, a core duty of considerate social conduct."},
 {"id": "sunao", "name": "Sunao", "kanji": "素直", "domain": "Life", "description": "Being honest, open, and unguarded, receptive without stubbornness or pretense.", "example": "A leader who stays sunao takes feedback without defensiveness, which speeds their own growth and models openness for the team.", "q": "What is sunao?", "a": "An honest, open, and unguarded disposition that accepts truth and guidance without resistance or pretense."},
 {"id": "gaman", "name": "Gaman", "kanji": "我慢", "domain": "Life", "description": "Dignified endurance of hardship, bearing the difficult with patience and self-control.", "example": "During a tough quarter, a leader shows gaman by absorbing stress calmly rather than panicking, which keeps the team steady.", "q": "What is gaman?", "a": "The dignified, patient endurance of hardship with self-control and without complaint."},
 {"id": "ganbaru", "name": "Ganbaru", "kanji": "頑張る", "domain": "Life", "description": "To give it your all and persevere, pushing through with full effort and determination.", "example": "A team that embraces ganbaru keeps grinding toward a hard deadline, drawing energy from shared commitment.", "q": "What does ganbaru mean?", "a": "To persevere and give your full effort, pushing on with determination despite difficulty."},
 {"id": "nana-korobi-ya-oki", "name": "Nana korobi ya oki", "kanji": "七転び八起き", "domain": "Life", "description": "Fall seven times, rise eight; an ethos of resilience and getting back up after every failure.", "example": "After a failed product launch, a resilient founder lives nana korobi ya oki by treating the fall as practice and trying again.", "q": "What does nana korobi ya oki teach about resilience?", "a": "Fall seven times, rise eight; what matters is always getting back up, no matter how often you are knocked down."},
 {"id": "shikata-ga-nai", "name": "Shikata ga nai", "kanji": "仕方がない", "domain": "Life", "description": "Accepting with grace what cannot be helped, releasing struggle against the unchangeable.", "example": "When a deal collapses for reasons outside their control, a wise leader says shikata ga nai, lets go of blame, and redirects energy forward.", "q": "When is invoking shikata ga nai healthy versus an excuse?", "a": "It is healthy as graceful acceptance of what truly cannot be changed, but an excuse if used to avoid acting on what can be."},
 {"id": "hara-hachi-bu", "name": "Hara hachi bu", "kanji": "腹八分", "domain": "Life", "description": "Eat until about 80% full; a principle of moderation and knowing when to stop.", "example": "Applied beyond food, hara hachi bu reminds a leader to stop short of overcommitting the team, leaving slack for the unexpected.", "q": "What is hara hachi bu?", "a": "The practice of eating to roughly 80% fullness, a broader lesson in moderation and restraint."},
 {"id": "okagesama", "name": "Okagesama", "kanji": "おかげさま", "domain": "Life", "description": "Gratitude for the unseen support and help that made one's wellbeing possible.", "example": "A leader accepting praise says okagesama, crediting the team and the support behind a win rather than claiming it alone.", "q": "What attitude does okagesama express?", "a": "Gratitude for the unseen help and support of others that quietly enables one's own wellbeing or success."},
 {"id": "otagaisama", "name": "Otagaisama", "kanji": "お互い様", "domain": "Life", "description": "Mutual help and reciprocity, the sense that we are all in it together and aid each other in turn.", "example": "When a teammate covers your work during an emergency, otagaisama means you do the same for them later, no scorekeeping needed.", "q": "What does otagaisama capture about teams?", "a": "Mutual help and shared circumstance; we support one another because today's helper is tomorrow's helped."},
 {"id": "otsukaresama", "name": "Otsukaresama", "kanji": "お疲れ様", "domain": "Life", "description": "An expression honoring another person's effort and tiredness, acknowledging their hard work.", "example": "Closing a long project, a leader tells the team otsukaresama, recognizing their fatigue and effort before celebrating the result.", "q": "When would you say otsukaresama?", "a": "To acknowledge and honor someone's effort and weariness, typically after shared hard work or at the end of a workday."},
 {"id": "omotenashi", "name": "Omotenashi", "kanji": "おもてなし", "domain": "Life", "description": "Wholehearted, anticipatory hospitality that meets a guest's needs before they are voiced.", "example": "A client-focused leader practices omotenashi by anticipating what the customer will need next and preparing it without being asked.", "q": "What distinguishes omotenashi from ordinary service?", "a": "It is selfless, anticipatory hospitality that foresees and meets needs before they are expressed, expecting nothing in return."},
 {"id": "ichigo-ichie", "name": "Ichigo ichie", "kanji": "一期一会", "domain": "Life", "description": "Treasure this once-only meeting; the awareness that each encounter is unique and unrepeatable.", "example": "A leader who lives ichigo ichie gives full presence to each conversation, treating every meeting as a one-time chance to connect.", "q": "What does ichigo ichie remind us to do in our relationships?", "a": "To treasure each encounter as unique and unrepeatable, giving it our full attention because this exact moment will never come again."},
 {"id": "mottainai", "name": "Mottainai", "kanji": "勿体無い", "domain": "Life", "description": "A feeling of regret at waste and a call to use things fully and respect their value.", "example": "A leader applies mottainai to talent, ensuring people's skills are not wasted on work beneath their potential.", "q": "What is mottainai?", "a": "A sense of regret over waste and the impulse to use resources, time, and things fully and respectfully."},
 {"id": "yuimaru", "name": "Yuimaru", "kanji": "ゆいまーる", "domain": "Life", "description": "An Okinawan tradition of a circle of mutual aid, where community members pool effort to help one another.", "example": "A team operating like yuimaru rotates help to whoever is overloaded, building deep trust and shared resilience.", "q": "What is yuimaru?", "a": "An Okinawan circle of mutual aid in which community members cooperatively share labor and support one another."},
 {"id": "mukoyoshi", "name": "Mukoyoshi", "kanji": "婿養子", "domain": "Life", "description": "Adopting a capable heir, often a son-in-law, by merit rather than bloodline to continue a family or business.", "example": "Like a founder choosing a successor on competence over family ties, mukoyoshi shows how merit-based succession protects an institution's future.", "q": "How does mukoyoshi reflect a merit-based view of succession?", "a": "It brings in an adopted heir chosen for capability rather than birth, prioritizing the institution's continuity over bloodline."},
 {"id": "ct-staple-length", "name": "Staple length", "kanji": "", "domain": "Fiber & Yarn", "description": "The length of an individual cotton fiber. Longer staple (>1.1 inches) means finer, stronger, softer yarn — and a higher price. Extra-long staple (ELS) cotton like Pima and Egyptian commands a significant premium over commodity upland.", "example": "When a shirt brand sources Supima cotton, they are paying 3–5× commodity price specifically for the staple length advantage — it enables a finer yarn count and a smoother hand feel.", "q": "Why does staple length matter to a fabric buyer?", "a": "Longer fibers spin into finer, stronger, smoother yarn — the key driver of softness and quality at a price premium."},
 {"id": "ct-micronaire", "name": "Micronaire", "kanji": "", "domain": "Fiber & Yarn", "description": "A measure of fiber fineness and maturity. Optimal range is 3.5–4.9 μg/inch. Too fine (immature fiber) dyes poorly and pills; too coarse feels rough. Micronaire affects dye lot consistency across production.", "example": "A dye house rejecting a cotton lot is not always about grade — off-micronaire cotton absorbs color unevenly, causing stripe defects in finished fabric.", "q": "What does micronaire measure and why does it matter in production?", "a": "Fiber fineness and maturity; it directly affects dye uptake uniformity — off-range micronaire causes color inconsistency in finished fabric."},
 {"id": "ct-upland-cotton", "name": "Upland cotton", "kanji": "", "domain": "Fiber & Yarn", "description": "Gossypium hirsutum — the commodity grade, accounting for roughly 90% of world production. Shorter staple (0.9–1.1 inches), lower cost, grown widely in the US, Brazil, India, and Pakistan. The baseline fiber for most apparel and home textiles.", "example": "The white T-shirts and bedsheets in a mass retailer's private label are almost certainly upland cotton — the economics of scale require it.", "q": "What is upland cotton and why does it dominate production?", "a": "The commodity-grade species (G. hirsutum) with shorter staple, comprising ~90% of world production; lower cost enables mass-market pricing."},
 {"id": "ct-pima-els", "name": "Pima / Extra-long staple", "kanji": "", "domain": "Fiber & Yarn", "description": "American Pima cotton has fibers over 1.38 inches, grown mainly in the US Southwest. Extra-long staple (ELS) cotton produces finer, stronger, silkier yarn. Supima is the licensed trademark for US-grown Pima — with verified supply chain provenance.", "example": "A premium shirtmaker specifying Supima 120s is using extra-long staple to achieve the ultra-fine yarn count needed for luxury fabric — the staple length is the technical prerequisite.", "q": "What distinguishes Pima/ELS cotton from upland cotton commercially?", "a": "Fiber length exceeds 1.38 inches, enabling finer yarn counts and softer hand feel; commands a 3–5× price premium over commodity upland."},
 {"id": "ct-egyptian-cotton", "name": "Egyptian cotton", "kanji": "", "domain": "Fiber & Yarn", "description": "Long-staple cotton (G. barbadense) grown in Egypt's Nile Delta — Giza 86, Giza 87, and Giza 45 are premium varieties. Widely counterfeited: studies found ~90% of 'Egyptian cotton' products sold in the US and UK contain little or no Egyptian fiber. Authentic Egyptian cotton requires certifiable origin documentation.", "example": "A retailer's own-label 'Egyptian cotton' sheet claiming 600 thread count likely contains upland cotton from India or Pakistan — the claim is almost impossible to verify without a cotton fingerprinting test.", "q": "Why is 'Egyptian cotton' unreliable as a quality claim without certification?", "a": "Studies show ~90% of products labeled Egyptian cotton contain little or no actual Egyptian fiber — the claim is legally vague in most markets and widely counterfeited without origin verification."},
 {"id": "ct-combed-carded", "name": "Combed vs Carded", "kanji": "", "domain": "Fiber & Yarn", "description": "Carding aligns fibers roughly. Combing goes further, removing short fibers (noils) and straightening the rest — yielding a cleaner, stronger, more uniform yarn. Combed cotton costs 20–30% more but takes dye more evenly and pills less.", "example": "A basics brand switching from carded to combed yarn on their hero T-shirt can add $2–3 to fabric cost but justify a significant retail price premium by improving pill resistance and feel.", "q": "What does combing do to cotton yarn that carding does not?", "a": "Removes short fibers (noils) and aligns the rest more uniformly — producing a cleaner, stronger, smoother yarn that dyes more evenly and pills less."},
 {"id": "ct-ring-spun", "name": "Ring-spun yarn", "kanji": "", "domain": "Fiber & Yarn", "description": "Traditional spinning method where fiber is twisted onto a bobbin via a traveling ring — slower, more expensive, but produces a stronger, softer, more uniform strand. Most premium apparel specifies ring-spun. The alternative is open-end (OE) spinning.", "example": "A buyer can feel the difference immediately: ring-spun T-shirts drape and pill less than OE equivalents at the same yarn count — the trade-off is fabric cost.", "q": "Why would a brand specify ring-spun over open-end for a premium product?", "a": "Ring-spun is stronger, softer, and more uniform — better drape, less pilling, smoother surface — at a higher production cost."},
 {"id": "ct-open-end", "name": "Open-end (OE) spinning", "kanji": "", "domain": "Fiber & Yarn", "description": "A faster, cheaper spinning process where fibers are fed into a rotor and twisted by air — producing a slightly hairier, bulkier yarn than ring-spun. Dominant in commodity T-shirts, towels, and denim. Enables faster production at lower cost, with a trade-off in quality.", "example": "A fast-fashion brand's $5 T-shirt is almost certainly OE-spun — the economics of the price point require faster spinning at lower per-kg cost, accepting a coarser surface.", "q": "What is the key commercial advantage of OE spinning over ring-spun, and the trade-off?", "a": "Faster and cheaper production — but the yarn is slightly hairier and bulkier, with lower tensile strength and less refined surface quality."},
 {"id": "ct-yarn-count-ne", "name": "Yarn count (Ne)", "kanji": "", "domain": "Fiber & Yarn", "description": "Ne (English cotton count) measures yarn fineness — the number of 840-yard lengths per pound of yarn. Higher Ne means finer yarn. A dress shirt is typically Ne 80–140s; a canvas bag is Ne 8–12s. Finer count requires longer staple and better spinning — both raise cost.", "example": "A buyer specifying '120s two-ply' for a luxury shirt is setting fineness at a level that requires ELS cotton and ring-spinning, directly constraining their sourcing options to a handful of mills.", "q": "What does a higher Ne yarn count indicate, and what does it require?", "a": "A finer, thinner yarn — higher Ne requires longer staple fiber and more careful spinning, limiting sourcing options and raising cost."},
 {"id": "ct-supima", "name": "Supima", "kanji": "", "domain": "Fiber & Yarn", "description": "The trademarked brand of the Supima Association of US Pima cotton growers. Licensed brands must use 100% Supima fiber verified throughout the supply chain — only ~3% of world cotton qualifies. A brand can only use the Supima name with a licensing agreement and chain-of-custody audit.", "example": "When a brand says 'Supima cotton,' they have signed a licensing deal, source traceable US Pima, and pay a premium — it is a verifiable claim, unlike 'Egyptian cotton,' which is often counterfeited.", "q": "What makes Supima a more credible quality claim than 'Egyptian cotton'?", "a": "Supima is a licensed trademark with supply chain verification by the growers' association — the fiber source is traceable, unlike Egyptian cotton, which is widely counterfeited."},
 {"id": "ct-usda-grade", "name": "USDA cotton grade", "kanji": "", "domain": "Fiber & Yarn", "description": "The US grading system for upland cotton, assessing color (white to yellow-stained), leaf (trash content), and preparation (ginning quality). Grade is set at the gin and is a key price determinant — a two-grade drop can represent 15–20 cents per pound.", "example": "A spinning mill bidding on a US cotton lot checks the USDA grade certificate before pricing their yarn — 'Strict Middling' is priced differently from 'Low Middling' even at the same staple length.", "q": "What does USDA cotton grade measure and why does it affect downstream prices?", "a": "Color, trash content, and ginning preparation — lower grade means lower spinning efficiency and yarn quality, which flows into yarn and fabric pricing."},
 {"id": "ct-gsm", "name": "GSM", "kanji": "", "domain": "Fabric & Finish", "description": "Grams per square meter — the universal weight specification for fabric. A light dress shirt is 100–130 gsm; a mid-weight chino is 200–250 gsm; a canvas bag is 280–400 gsm. GSM determines drape, durability, warmth, and cost per meter — it is the first number in any fabric spec sheet.", "example": "A buyer switching a shirt fabric from 130 to 110 gsm saves cost per meter but risks a see-through effect at the retail stage — a quality rejection that costs more than the fabric saving.", "q": "Why is GSM the first specification a fabric buyer establishes?", "a": "It determines weight, drape, durability, and cost per meter — all other specs (yarn count, construction) follow from the target GSM."},
 {"id": "ct-thread-count", "name": "Thread count", "kanji": "", "domain": "Fabric & Finish", "description": "Threads per square inch in a woven fabric. Meaningful in bedding up to roughly 400 — above that, manufacturers split plied threads to inflate the number. GSM and staple fiber quality are more reliable quality indicators. Thread count is primarily a marketing metric in premium retail.", "example": "A buyer auditing a 1,000 thread count sheet claim will often find the 'threads' are two-ply strands counted separately — the true structure is closer to 250 thread count, and GSM tells the real story.", "q": "Why is thread count unreliable as a quality indicator above ~400?", "a": "Manufacturers inflate counts by splitting plied threads into their component strands — the number becomes a marketing figure; GSM and fiber quality are more reliable guides."},
 {"id": "ct-poplin", "name": "Poplin (broadcloth)", "kanji": "", "domain": "Fabric & Finish", "description": "A plain-weave fabric with a fine, tight structure — typically 100–140 gsm. The standard dress shirt fabric globally. Smooth, crisp, lightweight; warp yarns slightly finer than weft. A single spec like '100% cotton poplin, 110 gsm, 80s yarn' communicates the entire quality tier to any mill.", "example": "A corporate uniform program specifying 20,000 dress shirts writes 'cotton poplin 110 gsm 80s ring-spun' — that single line replaces a paragraph of quality negotiation.", "q": "What makes poplin the default dress shirt fabric?", "a": "Its fine, tight plain weave at 100–140 gsm delivers the smooth, crisp hand feel expected of formal shirting — a universally legible quality signal to mills."},
 {"id": "ct-twill-weave", "name": "Twill weave", "kanji": "", "domain": "Fabric & Finish", "description": "A weave with a diagonal rib pattern — warp yarns cross two or more weft yarns before going under one, shifting position each row. Creates a stronger, more drapeable fabric than plain weave. Base construction for denim, chinos, drill, and gabardine.", "example": "The durability of workwear comes directly from twill — its diagonal interlacing distributes stress better than plain weave, which is why jeans outlast a poplin shirt in abrasion by a factor of ten.", "q": "Why does twill weave produce a more durable fabric than plain weave?", "a": "Fewer interlacings per unit area distribute stress better and create longer yarn floats that absorb abrasion — at the cost of some surface opacity."},
 {"id": "ct-oxford-cloth", "name": "Oxford cloth", "kanji": "", "domain": "Fabric & Finish", "description": "A basket weave (2×2 or 4×4) where pairs of warp threads cross pairs of weft threads. Produces a textured, slightly rougher surface than poplin. The fabric of the Oxford cloth button-down (OCBD) — casual, breathable, slightly heavier than dress shirting, and legibly informal.", "example": "Brooks Brothers' core OCBD is Oxford cloth — the basket-weave texture reads as casual even in a formal meeting context, exactly the register the shirt is designed to occupy.", "q": "What is Oxford cloth and what register does it signal versus poplin?", "a": "A basket-weave fabric, slightly heavier and more textured than poplin — it reads as casual and approachable, the signature fabric of the OCBD shirt."},
