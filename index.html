<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#faf6ee">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Napkin Solo">
<title>Napkin Solo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#faf6ee; --card:#fffdf8; --ink:#26241f; --muted:#7c766a;
    --line:#26241f; --soon:#b06a3a;
    --safe-top:env(safe-area-inset-top); --safe-bot:env(safe-area-inset-bottom);
  }
  @media (prefers-color-scheme:dark){
    :root{--paper:#1a1813; --card:#231f19; --ink:#f0ebe0; --muted:#a39c8c;
      --line:#f0ebe0; --soon:#e0925c;}
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;min-height:100%}
  body{background:var(--paper);color:var(--ink);
    font-family:"Patrick Hand",-apple-system,sans-serif;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:100svh;padding:calc(var(--safe-top) + 32px) 22px calc(var(--safe-bot) + 28px);
    text-align:center}
  .brand{font-family:"Caveat",cursive;font-weight:700;font-size:64px;line-height:1;
    margin:0 0 6px}
  .underline{width:210px;max-width:70vw;height:14px;margin:0 auto 14px;display:block;color:var(--ink)}
  .tag{font-size:21px;color:var(--muted);margin:0 0 40px;max-width:30ch}
  .cards{display:flex;flex-wrap:wrap;gap:22px;justify-content:center;width:100%;max-width:620px}
  .card{position:relative;background:var(--card);border:2.5px solid var(--line);
    border-radius:20px;padding:30px 22px 26px;width:262px;max-width:100%;
    text-decoration:none;color:inherit;display:flex;flex-direction:column;align-items:center;
    gap:6px;transition:transform .12s ease, box-shadow .12s ease}
  .card:nth-child(1){transform:rotate(-1.3deg)}
  .card:nth-child(2){transform:rotate(1.3deg)}
  .card.live:hover,.card.live:active{transform:rotate(0) translateY(-3px);
    box-shadow:6px 8px 0 -2px var(--line)}
  .icon{width:74px;height:74px;color:var(--ink);margin-bottom:4px}
  .name{font-family:"Caveat",cursive;font-weight:700;font-size:38px;line-height:1}
  .desc{font-size:18px;color:var(--muted);line-height:1.3;max-width:22ch}
  .card.soon{opacity:.72}
  .badge{margin-top:10px;font-size:15px;color:var(--soon);
    border:2px dashed var(--soon);border-radius:999px;padding:3px 14px;transform:rotate(-2deg)}
  .go{margin-top:10px;font-size:17px;color:var(--ink);opacity:.8}
  .foot{margin-top:44px;font-size:16px;color:var(--muted)}
  @media (max-width:560px){ .brand{font-size:54px} .cards{gap:18px} }
</style>
</head>
<body>
  <h1 class="brand">Napkin Solo</h1>
  <svg class="underline" viewBox="0 0 210 14" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" aria-hidden="true">
    <path d="M4 9 C 45 3, 80 12, 120 6 S 190 4, 206 8"/>
  </svg>
  <p class="tag">Two little tools for a curious mind. Pick a door.</p>

  <div class="cards">
    <a class="card live" href="./dojo/">
      <svg class="icon" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M7 19 C 22 13, 42 13, 57 19"/>
        <path d="M9 26 L 55 26"/>
        <path d="M16 26 L 15 54"/>
        <path d="M48 26 L 49 54"/>
        <path d="M16 36 L 48 36"/>
      </svg>
      <div class="name">Dōjō</div>
      <div class="desc">Learn anything, one card at a time</div>
      <div class="go">enter →</div>
    </a>

    <div class="card soon" aria-disabled="true">
      <svg class="icon" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M14 12 L 50 12 L 50 48 L 38 48 L 32 54 L 26 48 L 14 48 Z"/>
        <path d="M22 24 L 42 24 M22 32 L 38 32"/>
        <path d="M40 44 L 54 30 L 58 34 L 44 48 Z"/>
      </svg>
      <div class="name">Napkin Solo</div>
      <div class="desc">Explain any idea in one sketch</div>
      <span class="badge">coming soon</span>
    </div>
  </div>

  <p class="foot">made on a napkin · napkinsolo.ai</p>
</body>
</html>
