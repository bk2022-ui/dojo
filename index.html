<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#d6452c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dōjō">
<title>Dōjō</title>
<style>
  :root{
    --bg:#f4f1ea; --surface:#fffdf8; --ink:#1f1d1a; --muted:#6b675f;
    --line:rgba(0,0,0,.10); --accent:#d6452c; --accent-soft:#fbe9e4;
    --good:#2e7d52; --ok:#b8860b; --miss:#c0392b;
    --r:16px; --safe-top:env(safe-area-inset-top); --safe-bot:env(safe-area-inset-bottom);
  }
  @media (prefers-color-scheme:dark){
    :root{--bg:#15140f;--surface:#211f1a;--ink:#f1ede3;--muted:#9d978a;
      --line:rgba(255,255,255,.12);--accent:#ef6a4f;--accent-soft:#3a221c;}
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    line-height:1.5;overscroll-behavior:none}
  #app{max-width:560px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;
    padding:calc(var(--safe-top) + 8px) 16px calc(var(--safe-bot) + 16px)}
  .top{display:flex;align-items:baseline;gap:10px;padding:6px 2px 14px}
  .top h1{font-size:26px;margin:0;letter-spacing:.5px}
  .top .sub{font-size:13px;color:var(--muted)}
  .view{flex:1;display:flex;flex-direction:column}
  .hidden{display:none!important}

  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:14px 10px;text-align:center}
  .stat b{display:block;font-size:24px}
  .stat span{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}

  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
  .chip{border:1px solid var(--line);background:var(--surface);color:var(--ink);
    border-radius:999px;padding:7px 13px;font-size:13px;cursor:pointer}
  .chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}

  .btn{display:block;width:100%;border:none;border-radius:var(--r);padding:17px;
    font-size:17px;font-weight:600;cursor:pointer;margin-top:12px;font-family:inherit}
  .btn.primary{background:var(--accent);color:#fff}
  .btn.ghost{background:var(--surface);color:var(--ink);border:1px solid var(--line)}
  .btn:active{transform:scale(.985)}
  .spacer{flex:1}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:22px;
    padding:26px 22px;flex:1;display:flex;flex-direction:column;justify-content:center;
    min-height:300px;text-align:center}
  .kanji{font-size:54px;line-height:1;margin:0 0 6px;color:var(--accent)}
  .name{font-size:26px;margin:0 0 4px;font-weight:600}
  .domain{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:18px}
  .hint{color:var(--muted);font-size:14px;margin-top:18px}
  .reveal{text-align:left;margin-top:6px}
  .reveal .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--accent);margin:16px 0 4px;font-weight:600}
  .reveal p{margin:0;font-size:16px}
  .q{font-size:19px;text-align:center;margin:0}

  .rate{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px}
  .rate button{border:none;border-radius:14px;padding:14px 6px;font-size:13px;font-weight:600;
    cursor:pointer;color:#fff;font-family:inherit;line-height:1.25}
  .r-known,.r-good{background:var(--good)} .r-heard,.r-ok{background:var(--ok)} .r-unknown,.r-miss{background:var(--miss)}
  .rate small{display:block;font-weight:400;opacity:.85;font-size:10px}

  .empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:var(--muted);gap:8px}
  .empty .big{font-size:40px}
  .progresstrack{height:4px;background:var(--line);border-radius:4px;margin:2px 0 16px;overflow:hidden}
  .progresstrack i{display:block;height:100%;background:var(--accent);width:0%}
  .reset{background:none;border:none;color:var(--muted);font-size:12px;text-decoration:underline;margin-top:16px;cursor:pointer;align-self:center}
</style>
</head>
<body>
<div id="app">
  <div class="top"><h1>Dōjō</h1><span class="sub" id="subtitle">concepts, internalised</span></div>

  <!-- HOME -->
  <div class="view" id="home">
    <div class="stats">
      <div class="stat"><b id="s-total">0</b><span>cards</span></div>
      <div class="stat"><b id="s-known">0</b><span>known</span></div>
      <div class="stat"><b id="s-due">0</b><span>due</span></div>
    </div>
    <div class="chips" id="chips"></div>
    <div class="spacer"></div>
    <button class="btn primary" id="go-learn">Learn — flip &amp; rate</button>
    <button class="btn ghost" id="go-review">Review — flashcards</button>
    <button class="reset" id="reset">reset progress</button>
  </div>

  <!-- LEARN -->
  <div class="view hidden" id="learn">
    <div class="progresstrack"><i id="learn-bar"></i></div>
    <div class="card" id="learn-card">
      <div>
        <p class="kanji" id="l-kanji"></p>
        <p class="name" id="l-name"></p>
        <p class="domain" id="l-domain"></p>
      </div>
      <div id="l-back" class="reveal hidden">
        <div class="lbl">What it means</div><p id="l-desc"></p>
        <div class="lbl">In practice</div><p id="l-ex"></p>
      </div>
      <p class="hint" id="l-hint">tap to reveal</p>
    </div>
    <div id="l-rate" class="rate hidden">
      <button class="r-known" data-r="known">Known<small>solid</small></button>
      <button class="r-heard" data-r="heard">Heard of<small>vaguely</small></button>
      <button class="r-unknown" data-r="unknown">New<small>teach me</small></button>
    </div>
    <button class="btn ghost" id="learn-exit">Done for now</button>
  </div>

  <!-- REVIEW -->
  <div class="view hidden" id="review">
    <div class="progresstrack"><i id="rev-bar"></i></div>
    <div class="card" id="review-card">
      <div>
        <p class="domain" id="r-domain"></p>
        <p class="q" id="r-q"></p>
      </div>
      <div id="r-back" class="reveal hidden">
        <div class="lbl" id="r-aname"></div><p id="r-a"></p>
        <div class="lbl">What it means</div><p id="r-desc"></p>
      </div>
      <p class="hint" id="r-hint">recall it, then tap</p>
    </div>
    <div id="r-grade" class="rate hidden">
      <button class="r-good" data-g="good">Got it<small>easy</small></button>
      <button class="r-ok" data-g="almost">Almost<small>fuzzy</small></button>
      <button class="r-miss" data-g="missed">Missed<small>again soon</small></button>
    </div>
    <button class="btn ghost" id="review-exit">Done for now</button>
  </div>

  <!-- DONE -->
  <div class="view hidden" id="done">
    <div class="empty">
      <div class="big">🍵</div>
      <p id="done-msg">Nice work.</p>
    </div>
    <button class="btn primary" id="done-home">Back to home</button>
  </div>
</div>

<script>
const CARDS = [
 {id:"gemba",name:"Gemba",kanji:"現場",domain:"Manufacturing",description:"The actual place where the real work happens; the idea that truth is found on the floor, not in reports.",example:"Before redesigning a process, a leader spends a day on the line watching the work and asking the doers — not reading a dashboard.",q:"A leader keeps deciding from dashboards and is consistently wrong. Which principle tells them where to go?",a:"Gemba — go to the actual place where the work happens and see it for yourself."},
 {id:"kaizen",name:"Kaizen",kanji:"改善",domain:"Manufacturing",description:"Continuous, small, everyone-owned improvement — a daily habit, not a one-off project.",example:"A team logs one tiny fix every shift; over a year the compounding gains outrun any single big redesign.",q:"What distinguishes kaizen from a 'transformation project'?",a:"Kaizen is continuous and daily, embedded as a philosophy — not a one-time event."},
 {id:"andon",name:"Andon",kanji:"行灯",domain:"Manufacturing",description:"A signal (originally a cord) any worker can pull to stop the line when they spot a problem.",example:"An employee empowered to halt shipping the moment quality slips — defects get fixed at source, not downstream.",q:"What does the andon cord say about who owns quality?",a:"Everyone — any worker can stop the line; quality is a shared responsibility."},
 {id:"shokunin",name:"Shokunin",kanji:"職人",domain:"Craft",description:"The craftsman devoted to the work itself — mastery and social duty fused, far beyond 'a job'.",example:"A specialist who refines one capability for decades, taking pride in the work regardless of who's watching.",q:"What separates a shokunin from someone just doing a job well?",a:"Devotion to the craft itself and a sense of duty — mastery as identity, not task completion."},
 {id:"shu-ha-ri",name:"Shu-ha-ri",kanji:"守破離",domain:"Craft",description:"The three stages of mastery: Shu (follow the form), Ha (break and adapt it), Ri (transcend it and set your own).",example:"A new hire first follows the playbook exactly (Shu), later bends it (Ha), eventually rewrites how the team works (Ri).",q:"Name the three stages of shu-ha-ri and what each means.",a:"Shu — obey the form; Ha — break/adapt it; Ri — transcend it and create your own."},
 {id:"kufu",name:"Kufū",kanji:"工夫",domain:"Craft",description:"Inventive ingenuity — devising a clever, resourceful better way, often within constraints.",example:"Lacking budget for new tooling, a team improvises a simple jig that removes a recurring error.",q:"What is kufū?",a:"Resourceful, inventive ingenuity — figuring out a better way, especially under constraint."},
 {id:"wabi-sabi",name:"Wabi-sabi",kanji:"侘寂",domain:"Aesthetics",description:"Beauty found in imperfection, impermanence, and incompleteness.",example:"A product design that leaves visible the marks of making, rather than a sterile flawless finish.",q:"What kind of beauty does wabi-sabi celebrate?",a:"The beauty of imperfection, impermanence, and the incomplete."},
 {id:"ma",name:"Ma",kanji:"間",domain:"Aesthetics",description:"The meaningful empty space or pause — the interval that gives the elements around it their power.",example:"A slide with one idea and lots of white space lands harder than a crowded one; the emptiness does the work.",q:"In design or speech, what is 'ma' and why does it matter?",a:"The deliberate empty space or pause — it gives weight and clarity to what surrounds it."},
 {id:"shoshin",name:"Shoshin",kanji:"初心",domain:"Philosophy",description:"Beginner's mind — approaching things with openness and no assumptions, even as an expert.",example:"A veteran enters a familiar problem asking naive questions, and spots what everyone else stopped seeing.",q:"What is shoshin, and why is it valuable for experts?",a:"Beginner's mind — openness without preconceptions; it lets experts see past their own assumptions."},
 {id:"mushin",name:"Mushin",kanji:"無心",domain:"Philosophy",description:"'No-mind' — acting fluidly without self-conscious thought or hesitation; flow.",example:"A presenter so rehearsed they stop monitoring themselves and simply respond to the room.",q:"What state does mushin describe?",a:"No-mind: effortless, unselfconscious action — flow without hesitation."},
 {id:"ikigai",name:"Ikigai",kanji:"生き甲斐",domain:"Life",description:"Your reason for being — what makes getting up worthwhile, at the intersection of what you love, do well, and value.",example:"Someone reframes a career choice around what gives daily life meaning, not just pay or status.",q:"What does ikigai mean?",a:"One's reason for being — the source of daily meaning and motivation."},
 {id:"ichigo-ichie",name:"Ichigo ichie",kanji:"一期一会",domain:"Life",description:"'One time, one meeting' — treasure each encounter as unrepeatable.",example:"Treating a routine client meeting as a one-of-a-kind moment changes how fully you show up.",q:"What attitude does ichigo ichie ask of you in a meeting or encounter?",a:"Treat it as unrepeatable and once-in-a-lifetime — be fully present, because it won't recur."}
];

const KEY="dojo.progress.v1";
const load=()=>{try{return JSON.parse(localStorage.getItem(KEY))||{}}catch(e){return{}}};
const save=p=>localStorage.setItem(KEY,JSON.stringify(p));
let prog=load();
let filter="all";
const DAY=864e5;
const INT=[0,1,3,7,16,30];
const $=id=>document.getElementById(id);
const show=v=>["home","learn","review","done"].forEach(x=>$(x).classList.toggle("hidden",x!==v));
const deck=()=>CARDS.filter(c=>filter==="all"||c.domain.toLowerCase()===filter);
const dueList=()=>{const n=Date.now();return deck().filter(c=>{const p=prog[c.id];return !p||!p.box||(p.due||0)<=n})};

function renderHome(){
  const d=deck();
  $("s-total").textContent=d.length;
  $("s-known").textContent=d.filter(c=>prog[c.id]&&prog[c.id].status==="known").length;
  $("s-due").textContent=dueList().length;
  const doms=["all",...[...new Set(CARDS.map(c=>c.domain.toLowerCase()))]];
  $("chips").innerHTML=doms.map(x=>`<div class="chip ${x===filter?'on':''}" data-d="${x}">${x}</div>`).join("");
  document.querySelectorAll(".chip").forEach(ch=>ch.onclick=()=>{filter=ch.dataset.d;renderHome()});
  show("home");
}

/* LEARN */
let lQueue=[],lIdx=0;
function startLearn(){lQueue=deck().slice();lIdx=0;if(!lQueue.length)return finish("Nothing here yet.");nextLearn()}
function nextLearn(){
  if(lIdx>=lQueue.length)return finish("You've been through the deck.");
  const c=lQueue[lIdx];
  $("l-kanji").textContent=c.kanji;$("l-name").textContent=c.name;$("l-domain").textContent=c.domain;
  $("l-desc").textContent=c.description;$("l-ex").textContent=c.example;
  $("l-back").classList.add("hidden");$("l-rate").classList.add("hidden");$("l-hint").classList.remove("hidden");
  $("learn-bar").style.width=Math.round(lIdx/lQueue.length*100)+"%";
  show("learn");
}
$("learn-card").onclick=()=>{if($("l-back").classList.contains("hidden")){
  $("l-back").classList.remove("hidden");$("l-hint").classList.add("hidden");$("l-rate").classList.remove("hidden");}};
document.querySelectorAll("#l-rate button").forEach(b=>b.onclick=()=>{
  const c=lQueue[lIdx];const r=b.dataset.r;
  const p=prog[c.id]||{};p.status=r;p.box=r==="known"?2:r==="heard"?1:0;
  p.due=Date.now()+INT[p.box]*DAY;p.seen=(p.seen||0)+1;prog[c.id]=p;save(prog);
  lIdx++;nextLearn();
});
$("learn-exit").onclick=()=>renderHome();

/* REVIEW */
let rQueue=[],rIdx=0;
function startReview(){rQueue=dueList();rIdx=0;if(!rQueue.length)return finish("All caught up — nothing due. 🌱");nextReview()}
function nextReview(){
  if(rIdx>=rQueue.length)return finish("Review complete. 🍵");
  const c=rQueue[rIdx];
  $("r-domain").textContent=c.domain;$("r-q").textContent=c.q;
  $("r-aname").textContent=c.name+(c.kanji?"  "+c.kanji:"");$("r-a").textContent=c.a;$("r-desc").textContent=c.description;
  $("r-back").classList.add("hidden");$("r-grade").classList.add("hidden");$("r-hint").classList.remove("hidden");
  $("rev-bar").style.width=Math.round(rIdx/rQueue.length*100)+"%";
  show("review");
}
$("review-card").onclick=()=>{if($("r-back").classList.contains("hidden")){
  $("r-back").classList.remove("hidden");$("r-hint").classList.add("hidden");$("r-grade").classList.remove("hidden");}};
document.querySelectorAll("#r-grade button").forEach(b=>b.onclick=()=>{
  const c=rQueue[rIdx];const g=b.dataset.g;const p=prog[c.id]||{box:0};
  if(g==="good")p.box=Math.min((p.box||0)+1,5),p.due=Date.now()+INT[p.box]*DAY;
  else if(g==="almost")p.due=Date.now()+1*DAY;
  else p.box=0,p.due=Date.now()+6e5;
  p.seen=(p.seen||0)+1;prog[c.id]=p;save(prog);
  rIdx++;nextReview();
});
$("review-exit").onclick=()=>renderHome();

function finish(msg){$("done-msg").textContent=msg;show("done")}
$("done-home").onclick=()=>renderHome();
$("go-learn").onclick=startLearn;
$("go-review").onclick=startReview;
$("reset").onclick=()=>{if(confirm("Reset all progress?")){prog={};save(prog);renderHome()}};

renderHome();
</script>
</body>
</html>
