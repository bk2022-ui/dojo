<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#faf6ee">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Napkin Solo">
<title>Napkin Solo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#faf6ee; --card:#fffdf8; --ink:#26241f; --muted:#7c766a;
    --line:#26241f; --soon:#b06a3a;
    --safe-top:env(safe-area-inset-top); --safe-bot:env(safe-area-inset-bottom);
  }
  @media (prefers-color-scheme:dark){
    :root{--paper:#1a1813; --card:#231f19; --ink:#f0ebe0; --muted:#a39c8c;
      --line:#f0ebe0; --soon:#e0925c;}
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;min-height:100%}
  body{background:var(--paper);color:var(--ink);
    font-family:"Patrick Hand",-apple-system,sans-serif;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:100svh;padding:calc(var(--safe-top) + 22px) 20px calc(var(--safe-bot) + 20px);
    text-align:center}
  .brand{font-family:"Caveat",cursive;font-weight:700;font-size:52px;line-height:1;margin:0 0 2px}
  .underline{width:188px;max-width:64vw;height:13px;margin:0 auto 12px;display:block;color:var(--ink)}
  .tag{font-size:19px;color:var(--muted);margin:0 0 26px;max-width:30ch}
  .cards{display:flex;flex-direction:column;gap:14px;width:100%;max-width:400px}
  .card{display:flex;align-items:center;gap:15px;text-align:left;
    background:var(--card);border:2.5px solid var(--line);border-radius:18px;
    padding:15px 17px;text-decoration:none;color:inherit;
    transition:transform .12s ease, box-shadow .12s ease}
  .card.live:active{transform:translateY(-2px);box-shadow:5px 6px 0 -2px var(--line)}
  @media (hover:hover){ .card.live:hover{transform:translateY(-2px);box-shadow:5px 6px 0 -2px var(--line)} }
  .icon{width:46px;height:46px;flex-shrink:0;color:var(--ink)}
  .ctext{flex:1;min-width:0}
  .name{font-family:"Caveat",cursive;font-weight:700;font-size:30px;line-height:1.05}
  .desc{font-size:15px;color:var(--muted);line-height:1.25;margin-top:1px}
  .end{flex-shrink:0;font-size:20px;color:var(--ink);opacity:.75}
  .card.soon{opacity:.72}
  .badge{flex-shrink:0;font-size:13px;color:var(--soon);
    border:2px dashed var(--soon);border-radius:999px;padding:3px 11px;transform:rotate(-2deg);white-space:nowrap}
  .foot{margin-top:30px;font-size:15px;color:var(--muted)}
</style>
</head>
<body>
  <h1 class="brand">Napkin Solo</h1>
  <svg class="underline" viewBox="0 0 188 13" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" aria-hidden="true">
    <path d="M4 8 C 40 3, 72 11, 108 6 S 170 4, 184 7"/>
  </svg>
  <p class="tag">Two little tools for a curious mind. Pick a door.</p>

  <div class="cards">
    <a class="card live" href="./dojo/">
      <svg class="icon" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M7 19 C 22 13, 42 13, 57 19"/>
        <path d="M9 26 L 55 26"/>
        <path d="M16 26 L 15 54"/>
        <path d="M48 26 L 49 54"/>
        <path d="M16 36 L 48 36"/>
      </svg>
      <div class="ctext">
        <div class="name">Dōjō</div>
        <div class="desc">Learn anything, one card at a time</div>
      </div>
      <div class="end">→</div>
    </a>

    <div class="card soon" aria-disabled="true">
      <svg class="icon" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M14 12 L 50 12 L 50 48 L 38 48 L 32 54 L 26 48 L 14 48 Z"/>
        <path d="M22 24 L 42 24 M22 32 L 38 32"/>
        <path d="M40 44 L 54 30 L 58 34 L 44 48 Z"/>
      </svg>
      <div class="ctext">
        <div class="name">Napkin Solo</div>
        <div class="desc">Explain any idea in one sketch</div>
      </div>
      <span class="badge">coming soon</span>
    </div>
  </div>

  <p class="foot">made on a napkin · napkinsolo.ai</p>
</body>
</html>
